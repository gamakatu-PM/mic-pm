<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>한국마이크로닉 현장관리 v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--border:#252a38;--accent:#3d7fff;--green:#00c896;--warn:#f5a623;--danger:#ff4d4d;--text:#e8ecf4;--text2:#8892a8;--text3:#4a5568;--purple:#a78bfa;--orange:#ff8c42;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* 헤더 */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 12px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:24px;height:24px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.logo-name{font-size:12px;font-weight:700;}.logo-sub{font-size:9px;color:var(--text2);}
.hdr-btns{display:flex;gap:5px;align-items:center;}
.hdr-date{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.hbtn{padding:4px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;}
/* 레이아웃 */
.layout{display:flex;flex:1;overflow:hidden;}
/* 사이드바 */
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-top{padding:8px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.add-btn{width:100%;padding:6px;background:rgba(61,127,255,0.12);border:1px dashed rgba(61,127,255,0.4);border-radius:7px;color:var(--accent);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.site-search{width:100%;padding:6px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.site-search::placeholder{color:var(--text3);}
.side-sec{padding:5px 9px 2px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.site-list-wrap{flex:1;overflow-y:auto;padding:5px;}
.site-list-wrap::-webkit-scrollbar{width:2px;}
.site-list-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.site-item{padding:8px 9px;border-radius:7px;cursor:pointer;margin-bottom:2px;transition:background 0.15s;border-left:2px solid transparent;}
.site-item:hover{background:var(--bg3);}
.site-item.active{background:rgba(61,127,255,0.12);border-left-color:var(--accent);}
.site-item-name{font-size:12px;font-weight:500;}
.site-item-meta{font-size:10px;color:var(--text2);margin-top:1px;}
.site-item-badges{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.mbadge{font-size:9px;padding:1px 4px;border-radius:6px;}
.mb-r{background:rgba(255,77,77,0.15);color:var(--danger);}
.mb-w{background:rgba(245,166,35,0.15);color:var(--warn);}
.mb-g{background:rgba(0,200,150,0.12);color:var(--green);}
/* 메인 */
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 12px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:9px 10px;font-size:11px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.content{flex:1;overflow-y:auto;padding:12px;}
.content::-webkit-scrollbar{width:3px;}
/* 카드 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.card-hdr{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.card-title{font-size:12px;font-weight:500;}
.card-btn{font-size:10px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}
/* 현장 헤더 */
.site-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.site-hdr h2{font-size:16px;font-weight:700;}
.site-hdr p{font-size:11px;color:var(--text2);margin-top:2px;}
.stage-pill{font-size:11px;padding:3px 9px;border-radius:18px;background:rgba(61,127,255,0.15);color:var(--accent);white-space:nowrap;}
/* 공정단계 */
.process-wrap{display:flex;align-items:center;overflow-x:auto;padding:14px;}
.proc-step{display:flex;flex-direction:column;align-items:center;min-width:64px;}
.proc-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--border);color:var(--text3);background:var(--bg2);cursor:pointer;transition:all 0.2s;}
.proc-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.proc-circle.cur{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 8px rgba(61,127,255,0.4);}
.proc-label{font-size:9px;color:var(--text2);margin-top:3px;text-align:center;line-height:1.3;}
.proc-line{flex:1;height:2px;background:var(--border);min-width:12px;}
.proc-line.done{background:var(--green);}
/* 수량표 */
.qty-table{width:100%;border-collapse:collapse;}
.qty-table th{padding:8px 11px;font-size:10px;color:var(--text3);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3);}
.qty-table td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.qty-table tr:last-child td{border-bottom:none;}
.mono{font-family:'JetBrains Mono',monospace;}
.c-g{color:var(--green);}.c-w{color:var(--warn);}.c-r{color:var(--danger);}
/* 엑셀 렌더 영역 */
#excelArea{width:100%;overflow:auto;max-height:500px;background:#1a1e28;border-radius:6px;margin-top:8px;}
#excelArea table{border-collapse:collapse;white-space:nowrap;font-size:11px;color:var(--text);width:max-content;}
#excelArea td,#excelArea th{border:1px solid var(--border);padding:6px 9px;text-align:center;cursor:pointer;}
#excelArea td:hover{background:rgba(61,127,255,0.1);}
.cell-changed{background:rgba(255,77,77,0.15)!important;color:var(--danger)!important;font-weight:600!important;}
/* 이슈/행 */
.row-item{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;}
.row-item:last-child{border-bottom:none;}
.dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.row-title{font-size:12px;font-weight:500;}
.row-meta{font-size:10px;color:var(--text2);margin-top:2px;}
/* 액션 */
.ag{display:grid;grid-template-columns:1fr 75px 65px 45px;gap:7px;padding:10px 13px;border-bottom:1px solid var(--border);align-items:center;}
.ag:last-child{border-bottom:none;}
.ag.hdr{background:var(--bg3);}
.col-l{font-size:10px;color:var(--text3);text-transform:uppercase;}
.chk{width:17px;height:17px;border:1px solid var(--border);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;}
.chk.done{background:var(--green);border-color:var(--green);color:#fff;}
/* 회의록 뷰어 */
.min-layout{display:grid;grid-template-columns:190px 1fr;height:100%;overflow:hidden;}
.min-list-item{padding:10px 11px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.min-list-item:hover{background:var(--bg3);}
.min-list-item.active{background:rgba(61,127,255,0.1);border-left:2px solid var(--accent);}
.min-list-title{font-size:11px;font-weight:500;line-height:1.4;}
.min-list-meta{font-size:9px;color:var(--text2);margin-top:2px;}
.min-viewer{padding:18px;overflow-y:auto;}
.min-doc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 24px;max-width:680px;}
.min-doc-title{font-size:16px;font-weight:700;margin-bottom:5px;}
.min-doc-meta{font-size:11px;color:var(--text2);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.md-body{font-size:13px;line-height:1.9;}
.md-body h1,.md-body h2,.md-body h3{font-weight:600;margin:14px 0 7px;}
.md-body h2{font-size:14px;}.md-body h3{font-size:13px;}
.md-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
.md-body th{background:var(--bg3);padding:7px 11px;text-align:left;border:1px solid var(--border);font-weight:500;}
.md-body td{padding:7px 11px;border:1px solid var(--border);}
.md-body ul,.md-body ol{padding-left:18px;margin-bottom:9px;}
.md-body li{margin-bottom:3px;}
.md-body strong{font-weight:600;}
.md-body blockquote{border-left:3px solid var(--accent);padding-left:11px;color:var(--text2);margin:9px 0;}
.min-doc-actions{display:flex;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.doc-btn{padding:6px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid;}
.db-ok{background:rgba(0,200,150,0.1);border-color:var(--green);color:var(--green);}
.db-del{background:rgba(255,77,77,0.1);border-color:var(--danger);color:var(--danger);}
.db-qty{background:rgba(245,166,35,0.1);border-color:var(--warn);color:var(--warn);}
/* 꼬리표 */
.qty-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(0,200,150,0.15);color:var(--green);margin-top:5px;border:1px solid rgba(0,200,150,0.3);}
/* 메모 */
.memo-row{padding:11px 13px;border-bottom:1px solid var(--border);}
.memo-row:last-child{border-bottom:none;}
.memo-tag{font-size:9px;padding:2px 5px;border-radius:6px;margin-right:5px;}
.mt-mail{background:rgba(167,139,250,0.15);color:var(--purple);}
.mt-kakao{background:rgba(245,166,35,0.15);color:var(--warn);}
.mt-sms{background:rgba(255,140,66,0.15);color:var(--orange);}
.mt-etc{background:rgba(74,85,104,0.15);color:var(--text3);}
/* 사진 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px;padding:12px;}
.photo-item{aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--bg3);cursor:pointer;position:relative;}
.photo-item img{width:100%;height:100%;object-fit:cover;}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.65);border:none;border-radius:3px;color:#fff;font-size:10px;padding:2px 4px;cursor:pointer;display:none;}
.photo-item:hover .photo-del{display:block;}
.photo-add{aspect-ratio:1;border-radius:7px;border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--text3);font-size:10px;}
.photo-add:hover{border-color:var(--accent);color:var(--accent);}
/* 계산 */
.calc-table{width:100%;border-collapse:collapse;}
.calc-table th{padding:8px 11px;font-size:10px;color:var(--text3);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border);text-align:left;}
.calc-table td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:12px;}
.calc-table tfoot td{font-weight:700;background:var(--bg3);}
/* 작업의뢰서 */
.wo-doc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;max-width:660px;}
.wo-title-main{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px;}
.wo-sub{font-size:11px;color:var(--text2);text-align:center;margin-bottom:18px;}
.wo-table{width:100%;border-collapse:collapse;margin-bottom:12px;}
.wo-table th{background:var(--bg3);padding:8px 11px;text-align:left;border:1px solid var(--border);font-size:11px;width:100px;}
.wo-table td{padding:8px 11px;border:1px solid var(--border);font-size:12px;}
.wo-sign{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:14px;}
.wo-sign-box{border:1px solid var(--border);border-radius:7px;padding:10px;text-align:center;}
.wo-sign-label{font-size:10px;color:var(--text2);margin-bottom:18px;}
/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-hdr-cell{text-align:center;font-size:10px;color:var(--text2);padding:7px 0;}
.cal-cell{min-height:55px;background:var(--bg3);border-radius:5px;padding:3px;}
.cal-cell.today{border:1px solid var(--accent);}
.cal-cell.other-month{opacity:0.35;}
.cal-date{font-size:10px;color:var(--text2);margin-bottom:2px;}
.cal-event{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;line-height:1.4;background:rgba(61,127,255,0.2);color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* 파이프라인 */
.pipe-cols{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;min-width:680px;}
.pipe-col{background:var(--bg3);border-radius:9px;padding:9px;}
.pipe-col-title{font-size:11px;font-weight:500;margin-bottom:8px;color:var(--text2);}
.pipe-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px;margin-bottom:7px;}
.pipe-card-name{font-size:12px;font-weight:500;}
.pipe-card-meta{font-size:10px;color:var(--text2);margin-top:2px;}
.pipe-add{width:100%;padding:6px;background:transparent;border:1px dashed var(--border);border-radius:7px;color:var(--text3);font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
/* 대시보드 */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.kpi-label{font-size:10px;color:var(--text2);margin-bottom:5px;}
.kpi-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px;}
/* AI 채팅 */
.ai-chat{padding:12px;}
.ai-msgs{min-height:80px;margin-bottom:10px;}
.ai-q{background:var(--bg3);border-radius:9px 9px 9px 2px;padding:7px 11px;font-size:12px;display:inline-block;max-width:80%;margin-bottom:7px;}
.ai-a{background:rgba(61,127,255,0.08);border:1px solid rgba(61,127,255,0.2);border-radius:9px 9px 2px 9px;padding:7px 11px;font-size:12px;display:inline-block;max-width:85%;float:right;clear:both;line-height:1.7;}
.cf::after{content:'';display:table;clear:both;}
.ai-row{display:flex;gap:7px;}
.ai-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;}
.ai-input:focus{border-color:var(--accent);}
.ai-input::placeholder{color:var(--text3);}
.ai-send{background:var(--accent);border:none;border-radius:7px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer;}
/* 업무일지 */
.wj-list-item{padding:9px 11px;border-bottom:1px solid var(--border);cursor:pointer;}
.wj-list-item:hover{background:var(--bg3);}
.wj-list-item.active{background:rgba(61,127,255,0.1);border-left:2px solid var(--accent);}
.wj-doc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;max-width:680px;}
.wj-date-hdr{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--accent);}
.wj-section{margin-bottom:14px;}
.wj-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.wj-item{margin-bottom:9px;}
.wj-item-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.wj-item-content{font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap;padding-left:11px;}
.wj-route{font-size:11px;color:var(--text3);margin-top:7px;padding:5px 9px;background:var(--bg3);border-radius:5px;display:inline-block;}
.wj-next{font-size:11px;color:var(--warn);margin-top:5px;}
/* 파일 */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;padding:12px;}
.file-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px;cursor:pointer;transition:border-color 0.15s;}
.file-card:hover{border-color:var(--accent);}
.file-icon{font-size:26px;margin-bottom:7px;}
.file-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-meta{font-size:9px;color:var(--text2);margin-top:3px;}
.file-add-area{border:2px dashed var(--border);border-radius:9px;padding:26px;text-align:center;cursor:pointer;margin:12px;transition:border-color 0.2s;}
.file-add-area:hover,.file-add-area.drag-over{border-color:var(--accent);}
/* 이력표 */
.hist-table{width:100%;border-collapse:collapse;font-size:11px;}
.hist-table th{background:var(--bg3);position:sticky;top:0;padding:9px;text-align:left;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);}
.hist-table td{padding:9px;border-bottom:1px solid var(--border);color:var(--text);}
/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:18px;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:14px;font-weight:600;margin-bottom:12px;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:7px;}
.modal textarea{resize:vertical;min-height:80px;}
.modal-btns{display:flex;gap:7px;margin-top:5px;}
.btn-ok{flex:1;background:var(--accent);border:none;border-radius:7px;padding:9px;color:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-warn{flex:1;background:var(--warn);border:none;border-radius:7px;padding:9px;color:#000;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:7px;font-size:12px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.sidebar{width:160px;}.pipe-cols{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="logo-mark">KM</div>
    <div><div class="logo-name">한국마이크로닉</div><div class="logo-sub">현장관리 v4</div></div>
  </div>
  <div class="hdr-btns">
    <span class="hdr-date" id="todayDate"></span>
    <button class="hbtn" style="background:rgba(61,127,255,0.15);border:1px solid rgba(61,127,255,0.4);color:var(--accent)" onclick="loadFromCloud()">불러오기</button>
    <button class="hbtn" style="background:var(--accent);color:#fff" onclick="saveToCloud()">저장</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="add-btn" onclick="openModal('addSiteModal')">+ 현장 추가</button>
      <input class="site-search" placeholder="현장 검색..." oninput="filterSites(this.value)"/>
    </div>
    <div class="site-list-wrap" id="siteList"></div>
  </div>
  <div class="main-area">
    <div class="tab-bar" id="tabBar"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzfF783inpczKxf1Y9-iWzHrGtjunk3RdqJVnCEjzkFczEh-cKymE9AZfdspm8Z-6ia/exec';
const STAGES=['설계중','CB외함 납품','분전함 설치','결선 작업','제품 설치','테스트','완료/수금'];
const PIPE_STAGES=['첫 접촉','설계의뢰','설계중','견적제출','계약완료'];
const PC={danger:'var(--danger)',warn:'var(--warn)',text3:'var(--text3)'};
const DOC_TYPE={estimate:'📋 견적서',exec:'💹 실행예산',contract:'📝 계약서',change:'🔄 변경내역서',tax:'🧾 세금계산서'};
const MEMO_TYPE={mail:'📧 메일',kakao:'💬 카카오톡',sms:'📱 문자',etc:'📝 기타'};
const TABS=['수량표','회의록','미결이슈','후속조치','발주처대화','메일','카카오톡','문자','작업의뢰서','사진','견적서','실행예산','계약서','첨부파일','AI대화'];

let sites=[
  {id:1,name:'연수동 FIP 현장',addr:'인천 연수구',products:'RCU, BSP, 챠임벨',client:'아카데미',stage:3,
   qty:{'챠임벨':{order:20,deliver:20,install:19,note:'AI: 잉여1개 소재불명',confirmed:false,history:[]},'BSP':{order:19,deliver:19,install:0,note:'',confirmed:false,history:[]}},
   issues:[{id:1,title:'잉여 속판 1개 소재 불명',priority:'danger',owner:'시공팀+아카데미',done:false}],
   actions:[{id:1,title:'잉여 속판 실물 확인',owner:'시공팀',due:'5/16',done:false}],
   minutes:[],memos:[],photos:[],calc:[{id:1,name:'RCU 시스템 계약',type:'contract',amount:85000000,date:'2026-03-15',note:''}],
   workorders:[],docs:[],files:[],schedule:[{title:'챠임벨 설치',date:'2026-05-20'}],excelHistory:[],excelHtml:'',excelChanges:{}},
  {id:2,name:'단양 디캠프',addr:'충북 단양',products:'MMO, 키센서',client:'디캠프',stage:2,
   qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}}
];
let pipeline=[
  {id:1,name:'속초 신라호텔',client:'속초 신라',addr:'강원 속초',stage:1,amount:120000000,note:'설계의뢰 접수'},
  {id:2,name:'제주 JW메리어트',client:'JW메리어트',addr:'제주',stage:0,amount:0,note:'첫 미팅 완료'}
];
let workJournals=[];
let currentSiteId=1,currentTab='수량표',selectedMinId=null,currentView='site',selectedWJId=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let qcTargetSid=null,qcTargetProduct=null,qcTargetEl=null;
let qlSourceTab='',qlSourceItemIdx=-1;

// ── 클라우드 ──
async function saveToCloud(){try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'save',data:{sites,pipeline,workJournals}})});showToast('저장됐습니다 ✓');}catch(e){showToast('저장 실패');}}
async function loadFromCloud(){showToast('불러오는 중...');try{const r=await fetch(SCRIPT_URL+'?action=load');const j=await r.json();if(j.status==='ok'&&j.data){if(j.data.sites)sites=j.data.sites;if(j.data.pipeline)pipeline=j.data.pipeline;if(j.data.workJournals)workJournals=j.data.workJournals;showToast('불러오기 완료 ✓');}else showToast('저장 데이터 없음');}catch(e){showToast('로컬 데이터 사용');}renderSiteList();dispatch();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400);}
function $(id){return document.getElementById(id);}
function mk(tag,cls){const el=document.createElement(tag);if(cls)el.className=cls;return el;}
function today(){return new Date().toISOString().slice(0,10);}

// ── 초기화 ──
function init(){$('todayDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});loadFromCloud();}
function dispatch(){if(currentView==='pipe')renderPipeline();else if(currentView==='dash')renderDash();else if(currentView==='cal')renderCalendar();else if(currentView==='wj')renderWJPage();else selectSite(currentSiteId);}

// ── 사이드바 ──
function renderSiteList(filter=''){
  const w=$('siteList');w.innerHTML='';
  [{label:'📊 전체 대시보드',meta:'',v:'dash',fn:()=>{currentView='dash';renderSiteList();renderDash();}},
   {label:'📝 업무일지',meta:workJournals.length+'건',v:'wj',fn:()=>{currentView='wj';renderSiteList();renderWJPage();}},
   {label:'🎯 영업 파이프라인',meta:pipeline.length+'개',v:'pipe',fn:()=>{currentView='pipe';renderSiteList();renderPipeline();}},
   {label:'📅 공정 캘린더',meta:'',v:'cal',fn:()=>{currentView='cal';renderSiteList();renderCalendar();}}
  ].forEach(item=>{const el=mk('div','site-item'+(currentView===item.v?' active':''));el.innerHTML=`<div class="site-item-name">${item.label}</div>${item.meta?`<div class="site-item-meta">${item.meta}</div>`:''}`;el.onclick=item.fn;w.appendChild(el);});
  const d=mk('div','side-sec');d.textContent='진행 현장';w.appendChild(d);
  sites.filter(s=>!filter||s.name.includes(filter)||s.addr.includes(filter)).forEach(s=>{
    const i=s.issues.filter(x=>!x.done).length,u=s.minutes.filter(m=>!m.read).length;
    const el=mk('div','site-item'+(currentSiteId===s.id&&currentView==='site'?' active':''));
    el.innerHTML=`<div class="site-item-name">${s.name}</div><div class="site-item-meta">${STAGES[s.stage]}</div><div class="site-item-badges">${i>0?`<span class="mbadge mb-r">이슈 ${i}</span>`:''}${u>0?`<span class="mbadge mb-w">미확인 ${u}</span>`:''}</div>`;
    el.onclick=()=>selectSite(s.id);w.appendChild(el);
  });
}
function filterSites(v){renderSiteList(v);}
function selectSite(id){currentSiteId=id;currentView='site';selectedMinId=null;renderSiteList();renderTabBar();renderTab(currentTab);}
function renderTabBar(){$('tabBar').innerHTML=TABS.map(t=>`<div class="tab ${t===currentTab?'active':''}" onclick="switchTab('${t}')">${t}</div>`).join('');}
function switchTab(t){currentTab=t;renderTabBar();renderTab(t);}
function renderTab(t){
  const site=sites.find(s=>s.id===currentSiteId);if(!site)return;
  const hdr=`<div class="site-hdr"><div><h2>${site.name}</h2><p>${site.addr} · ${site.client||''} · ${site.products}</p></div><span class="stage-pill">${STAGES[site.stage]}</span></div>`;
  const fn={수량표:renderQty,회의록:renderMinutes,미결이슈:renderIssues,후속조치:renderActions,발주처대화:renderTalks,메일:()=>renderMemoTab(site,'mail'),카카오톡:()=>renderMemoTab(site,'kakao'),문자:()=>renderMemoTab(site,'sms'),작업의뢰서:renderWO,사진:renderPhotos,견적서:()=>renderDocTab(site,'estimate'),실행예산:()=>renderDocTab(site,'exec'),계약서:()=>renderDocTab(site,'contract'),첨부파일:renderFiles,AI대화:renderAI};
  $('mainContent').innerHTML=hdr+(fn[t]?fn[t](site):'');
}

// ── 수량표 (엑셀 렌더링 + 이력추적) ──
function renderQty(site){
  if(!site.excelHistory)site.excelHistory=[];
  if(!site.excelChanges)site.excelChanges={};
  const area=site.excelHtml?`<div id="excelArea">${site.excelHtml}</div>`:`<div style="padding:36px;text-align:center;color:var(--text2);font-size:12px">📊 엑셀 업로드 버튼으로 수량표를 불러오세요.<br><small style="color:var(--text3)">셀 클릭 시 변경 사유 입력 창이 열립니다.</small></div>`;
  const rows=Object.entries(site.qty).map(([p,q])=>{const rem=(q.deliver||0)-(q.install||0);const rc=rem>0?'c-w':rem<0?'c-r':'c-g';return `<tr><td style="font-weight:500">${p}</td><td class="mono">${q.order||'-'}</td><td class="mono">${q.deliver||'-'}</td><td class="mono">${q.install||'-'}</td><td class="mono ${rc}">${q.order?rem:'-'}</td><td style="font-size:10px;color:var(--text3)">${(q.history||[]).length}건</td><td><span style="font-size:10px;color:var(--accent);cursor:pointer" onclick="openQtyManual(${site.id},'${p}')">수정</span></td></tr>`;}).join('');
  const manualTable=Object.keys(site.qty).length?`<div class="card" style="margin-top:10px"><div class="card-hdr"><span class="card-title">수동 입력 수량표</span><button class="card-btn" onclick="openQtyNew(${site.id})">+ 제품 추가</button></div><table class="qty-table"><thead><tr><th>제품</th><th>발주</th><th>납품</th><th>설치</th><th>잔여</th><th>변경이력</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'';
  return `<div class="card"><div class="card-hdr"><span class="card-title">원본 수량표 (엑셀)</span><div style="display:flex;gap:6px"><button class="card-btn" style="color:var(--green);border:1px solid var(--green);border-radius:5px;padding:2px 7px" onclick="openHistModal(${site.id})">📋 변경이력 조회</button><label style="font-size:10px;color:var(--accent);cursor:pointer;padding:2px 7px;border:1px solid var(--accent);border-radius:5px">📊 엑셀 업로드<input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(${site.id},this)"/></label></div></div>${area}</div>${manualTable}`;
}

function importExcel(sid,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const site=sites.find(s=>s.id===sid);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const html=XLSX.utils.sheet_to_html(ws);
      site.excelHtml=html;
      if(!site.excelHistory)site.excelHistory=[];
      if(!site.excelChanges)site.excelChanges={};
      showToast('엑셀 업로드 완료 ✓');
      renderTab(currentTab);
      setTimeout(()=>attachExcelEvents(site),80);
    }catch(err){showToast('엑셀 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function attachExcelEvents(site){
  const area=$('excelArea');if(!area)return;
  // 기존 변경사항 색상 복원
  Object.entries(site.excelChanges||{}).forEach(([id,val])=>{
    const el=area.querySelector(`[data-cid="${id}"]`);
    if(el){el.innerText=val;el.classList.add('cell-changed');}
  });
  let ci=0;
  area.querySelectorAll('td').forEach(cell=>{
    if(!cell.getAttribute('data-cid'))cell.setAttribute('data-cid','c'+ci++);
    cell.addEventListener('click',function(){
      const cid=this.getAttribute('data-cid');
      const old=this.innerText.trim();
      qcTargetSid=site.id;qcTargetEl=this;
      $('qcOld').textContent=old||'(빈칸)';
      $('qcNew').value=old;
      $('qcDate').value=today();
      $('qcPerson').value='';$('qcReason').value='';
      $('btnQCSave').disabled=true;
      openModal('qtyChangeModal');
    });
  });
}

function openQtyLink(sourceTab,sourceIdx){
  const site=sites.find(s=>s.id===currentSiteId);
  qlSourceTab=sourceTab;qlSourceItemIdx=sourceIdx;
  $('qlSource').textContent=sourceTab;
  const sel=$('qlProduct');sel.innerHTML=Object.keys(site.qty).map(p=>`<option value="${p}">${p}</option>`).join('');
  $('qlNew').value='';$('qlDate').value=today();$('qlPerson').value='';$('qlReason').value='';
  $('btnQLSave').disabled=true;
  openModal('qtyLinkModal');
}
function validateQL(){const ok=$('qlNew').value.trim()&&$('qlDate').value&&$('qlPerson').value.trim()&&$('qlReason').value.trim();$('btnQLSave').disabled=!ok;}
function applyQtyLink(){
  const site=sites.find(s=>s.id===currentSiteId);
  const p=$('qlProduct').value,f=$('qlField').value;
  const nv=parseInt($('qlNew').value)||0;
  if(!site.qty[p])site.qty[p]={order:0,deliver:0,install:0,confirmed:false,history:[]};
  const old=site.qty[p][f]||0;
  site.qty[p][f]=nv;
  if(!site.qty[p].history)site.qty[p].history=[];
  site.qty[p].history.push({date:$('qlDate').value,detail:`${f} ${old}→${nv}`,person:$('qlPerson').value,reason:$('qlReason').value,source:qlSourceTab});
  if(!site.excelHistory)site.excelHistory=[];
  site.excelHistory.push({date:$('qlDate').value,detail:`[${p}] ${f} ${old}→${nv}`,person:$('qlPerson').value,reason:$('qlReason').value,source:qlSourceTab});
  // 원본 메모에 꼬리표 추가
  if(qlSourceTab==='카카오톡'||qlSourceTab==='메일'||qlSourceTab==='문자'){
    const memo=site.memos[qlSourceItemIdx];
    if(memo&&!memo.qtyLinked)memo.qtyLinked=[];
    if(memo)memo.qtyLinked.push(`${today()} [${p}] ${f} 수량표 반영완료`);
  }
  if(qlSourceTab==='회의록'){
    const m=site.minutes[qlSourceItemIdx];
    if(m&&!m.qtyLinked)m.qtyLinked=[];
    if(m)m.qtyLinked.push(`${today()} [${p}] ${f} 수량표 반영완료`);
  }
  closeModal('qtyLinkModal');
  showToast(`[${p}] ${f} 수량표 반영 완료 ✓`);
  renderTab(currentTab);
}

// ── 계산 ──
function renderCalc(site){if(!site.calc)site.calc=[];const tl={contract:'계약금액',add:'증액',sub:'감액',collect:'수금'};const tc={contract:'var(--accent)',add:'var(--green)',sub:'var(--danger)',collect:'var(--purple)'};let tot=0,col=0;site.calc.forEach(c=>{if(c.type==='contract'||c.type==='add')tot+=c.amount;else if(c.type==='sub')tot-=c.amount;else if(c.type==='collect')col+=c.amount;});const rem=tot-col;const rows=site.calc.map((c,i)=>`<tr><td style="color:${tc[c.type]}">${tl[c.type]}</td><td>${c.name}</td><td style="text-align:right;font-family:JetBrains Mono">${c.amount.toLocaleString()}</td><td style="font-size:10px;color:var(--text2)">${c.date}</td><td><span style="font-size:10px;color:var(--danger);cursor:pointer" onclick="delCalc(${site.id},${i})">삭제</span></td></tr>`).join('');return `<div class="card"><div class="card-hdr"><span class="card-title">계약 · 증감 · 수금</span><button class="card-btn" onclick="openModal('calcModal')">+ 추가</button></div><table class="calc-table"><thead><tr><th>구분</th><th>항목</th><th style="text-align:right">금액(원)</th><th>날짜</th><th></th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="2">계약 합계</td><td style="text-align:right;font-family:JetBrains Mono;color:var(--accent)">${tot.toLocaleString()}</td><td colspan="2"></td></tr><tr><td colspan="2">수금 완료</td><td style="text-align:right;font-family:JetBrains Mono;color:var(--green)">${col.toLocaleString()}</td><td colspan="2"></td></tr><tr><td colspan="2" style="color:${rem>0?'var(--danger)':'var(--green)'}">미수금</td><td style="text-align:right;font-family:JetBrains Mono;color:${rem>0?'var(--danger)':'var(--green)'}">${rem.toLocaleString()}</td><td colspan="2"></td></tr></tfoot></table></div>`;}
function addCalc(){const site=sites.find(s=>s.id===currentSiteId);if(!site.calc)site.calc=[];const n=$('calc-name').value.trim();if(!n)return;site.calc.push({id:Date.now(),name:n,type:$('calc-type').value,amount:parseInt($('calc-amount').value)||0,date:$('calc-date').value||today(),note:$('calc-note').value});closeModal('calcModal');renderTab(currentTab);}
function delCalc(sid,idx){sites.find(s=>s.id===sid).calc.splice(idx,1);renderTab(currentTab);}

// ── 작업의뢰서 ──
function renderWO(site){if(!site.workorders)site.workorders=[];const rows=site.workorders.map((w,i)=>`<div class="row-item" style="cursor:pointer" onclick="viewWO(${site.id},${i})"><div class="dot" style="background:var(--purple)"></div><div style="flex:1"><div class="row-title">${w.title}</div><div class="row-meta">${w.dept} · ${w.deadline}</div></div><span style="font-size:10px;color:var(--danger);cursor:pointer" onclick="event.stopPropagation();delWO(${site.id},${i})">삭제</span></div>`).join('')||'<div style="padding:18px;text-align:center;color:var(--text2)">작업의뢰서 없음</div>';return `<div class="card"><div class="card-hdr"><span class="card-title">작업의뢰서</span><button class="card-btn" onclick="openModal('woModal')">+ 작성</button></div>${rows}</div>`;}
function genWO(){const site=sites.find(s=>s.id===currentSiteId);if(!site.workorders)site.workorders=[];const t=$('wo-title').value.trim();if(!t)return;site.workorders.push({id:Date.now(),title:t,dept:$('wo-dept').value,deadline:$('wo-deadline').value,content:$('wo-content').value,date:today(),site:site.name});closeModal('woModal');renderTab(currentTab);}
function viewWO(sid,idx){const s=sites.find(x=>x.id===sid);const w=s.workorders[idx];const hdr=`<div class="site-hdr"><div><h2>${s.name}</h2></div><button onclick="renderTab('작업의뢰서')" style="padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;cursor:pointer;font-family:Noto Sans KR,sans-serif">← 목록</button></div>`;$('mainContent').innerHTML=hdr+`<div class="wo-doc"><div class="wo-title-main">작 업 의 뢰 서</div><div class="wo-sub">한국마이크로닉(주)</div><table class="wo-table"><tr><th>수신부서</th><td>${w.dept}</td><th>작성일</th><td class="mono">${w.date}</td></tr><tr><th>현장명</th><td colspan="3">${w.site}</td></tr><tr><th>작업제목</th><td colspan="3">${w.title}</td></tr><tr><th>완료기한</th><td colspan="3" class="mono">${w.deadline}</td></tr></table><div style="font-size:12px;font-weight:500;margin-bottom:7px">작업 내용</div><div style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;font-size:12px;line-height:1.8;white-space:pre-wrap">${w.content}</div><div class="wo-sign"><div class="wo-sign-box"><div class="wo-sign-label">작성자 (배성윤)</div><div style="font-size:10px;color:var(--text2)">PM 차장</div></div><div class="wo-sign-box"><div class="wo-sign-label">팀장</div></div><div class="wo-sign-box"><div class="wo-sign-label">수신: ${w.dept}</div></div></div><div style="margin-top:12px;text-align:center"><button onclick="window.print()" style="padding:7px 18px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer">🖨 인쇄</button></div></div>`;}
function delWO(sid,idx){sites.find(s=>s.id===sid).workorders.splice(idx,1);renderTab(currentTab);}

// ── 문서(견적/실행/계약) ──
function renderDocTab(site,type){if(!site.docs)site.docs=[];const list=site.docs.filter(d=>d.type===type);const rows=list.map((d,i)=>`<div class="row-item" style="cursor:pointer" onclick="viewDoc(${site.id},${site.docs.indexOf(d)})"><div class="dot" style="background:var(--accent)"></div><div style="flex:1"><div class="row-title">${DOC_TYPE[d.type]} ${d.title}</div><div class="row-meta">${d.date}${d.amount?` · ${parseInt(d.amount).toLocaleString()}원`:''}</div></div><span style="font-size:10px;color:var(--danger);cursor:pointer" onclick="event.stopPropagation();delDoc(${site.id},${site.docs.indexOf(d)})">삭제</span></div>`).join('')||`<div style="padding:18px;text-align:center;color:var(--text2)">${DOC_TYPE[type]} 없음</div>`;return `<div class="card"><div class="card-hdr"><span class="card-title">${DOC_TYPE[type]}</span><button class="card-btn" onclick="openDocModal2('${type}')">+ 추가</button></div>${rows}</div>`;}
function openDocModal2(type){$('doc-type').value=type;$('doc-title').value='';$('doc-date').value=today();$('doc-amount').value='';$('doc-content').value='';openModal('docModal');}
function addDoc(){const site=sites.find(s=>s.id===currentSiteId);if(!site.docs)site.docs=[];const t=$('doc-title').value.trim();if(!t)return;site.docs.push({id:Date.now(),type:$('doc-type').value,title:t,date:$('doc-date').value||today(),amount:$('doc-amount').value,content:$('doc-content').value});closeModal('docModal');renderTab(currentTab);}
function viewDoc(sid,idx){const s=sites.find(x=>x.id===sid);const d=s.docs[idx];const hdr=`<div class="site-hdr"><div><h2>${s.name}</h2></div><button onclick="renderTab('견적서')" style="padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;cursor:pointer;font-family:Noto Sans KR,sans-serif">← 목록</button></div>`;$('mainContent').innerHTML=hdr+`<div class="min-doc"><div class="min-doc-title">${DOC_TYPE[d.type]} - ${d.title}</div><div class="min-doc-meta">📅 ${d.date}${d.amount?` · 💰 ${parseInt(d.amount).toLocaleString()}원`:''}</div><div class="md-body">${marked.parse(d.content||'')}</div><div class="min-doc-actions"><button class="doc-btn db-del" onclick="delDoc(${s.id},${idx});renderTab('견적서')">삭제</button></div></div>`;}
function delDoc(sid,idx){sites.find(s=>s.id===sid).docs.splice(idx,1);renderTab(currentTab);}

// ── 첨부파일 ──
function renderFiles(site){if(!site.files)site.files=[];const fi=(n)=>{const e=n.split('.').pop().toLowerCase();return {pdf:'📄',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',pptx:'📑',jpg:'🖼',jpeg:'🖼',png:'🖼'}[e]||'📎';};const cards=site.files.map((f,i)=>`<div class="file-card"><div class="file-icon">${fi(f.name)}</div><div class="file-name">${f.name}</div><div class="file-meta">${f.date} · ${(f.size/1024).toFixed(0)}KB</div><div style="margin-top:6px"><span style="font-size:10px;color:var(--danger);cursor:pointer" onclick="delFile(${site.id},${i})">삭제</span></div></div>`).join('');return `<div class="card"><div class="card-hdr"><span class="card-title">첨부파일 ${site.files.length}개</span></div><div class="file-add-area" ondragover="this.classList.add('drag-over');event.preventDefault()" ondragleave="this.classList.remove('drag-over')" ondrop="dropFiles(${site.id},event);this.classList.remove('drag-over')"><div style="font-size:26px;margin-bottom:7px">📁</div><div style="font-size:12px;color:var(--text2);margin-bottom:9px">끌어다 놓거나</div><label style="padding:7px 14px;background:var(--accent);border-radius:7px;color:#fff;font-size:11px;cursor:pointer">파일 선택<input type="file" multiple style="display:none" onchange="addFiles(${site.id},this)"/></label></div>${cards?`<div class="file-grid">${cards}</div>`:''}</div>`;}
function addFiles(sid,input){const site=sites.find(s=>s.id===sid);if(!site.files)site.files=[];Array.from(input.files).forEach(f=>{const r=new FileReader();r.onload=e=>{site.files.push({name:f.name,size:f.size,date:today(),data:e.target.result});renderTab(currentTab);};r.readAsDataURL(f);});}
function dropFiles(sid,e){e.preventDefault();addFiles(sid,{files:e.dataTransfer.files});}
function delFile(sid,idx){if(!confirm('삭제?'))return;sites.find(s=>s.id===sid).files.splice(idx,1);renderTab(currentTab);}

// ── AI 대화 ──
function renderAI(site){return `<div class="card"><div class="card-hdr"><span class="card-title">🤖 AI 현장 대화</span></div><div class="ai-chat"><div class="ai-msgs" id="aiMsgs"><div><div class="ai-q">${site.name} 현황은?</div></div><div class="cf"><div class="ai-a"><strong>${site.name}</strong><br>📍 ${STAGES[site.stage]}<br>⚠️ 이슈 ${site.issues.filter(i=>!i.done).length}건<br>📋 미확인 회의록 ${site.minutes.filter(m=>!m.read).length}건<br>💰 미수금 ${calcRem(site).toLocaleString()}원<br>📊 수량변경이력 ${(site.excelHistory||[]).length}건</div></div></div><div class="ai-row"><input class="ai-input" id="aiInput" placeholder="이슈, 수량, 회의록, 미수금, 변경이력..." onkeydown="if(event.key==='Enter')sendAI(${site.id})"/><button class="ai-send" onclick="sendAI(${site.id})">전송</button></div></div></div>`;}
function calcRem(site){if(!site.calc)return 0;let t=0,c=0;site.calc.forEach(x=>{if(x.type==='contract'||x.type==='add')t+=x.amount;else if(x.type==='sub')t-=x.amount;else if(x.type==='collect')c+=x.amount;});return t-c;}
function sendAI(sid){const inp=$('aiInput');const q=inp.value.trim();if(!q)return;inp.value='';const site=sites.find(s=>s.id===sid);const msgs=$('aiMsgs');msgs.innerHTML+=`<div style="margin-bottom:7px"><div class="ai-q">${q}</div></div>`;setTimeout(()=>{msgs.innerHTML+=`<div class="cf" style="margin-bottom:7px"><div class="ai-a">${aiAns(site,q)}</div></div>`;msgs.scrollTop=msgs.scrollHeight;},300);}
function aiAns(site,q){const ql=q.toLowerCase();if(ql.includes('이슈'))return site.issues.filter(i=>!i.done).map(i=>`⚠️ ${i.title}(${i.owner})`).join('<br>')||'미결 이슈 없음 ✓';if(ql.includes('변경이력')||ql.includes('수량이력'))return (site.excelHistory||[]).slice(-5).map(h=>`📋 [${h.date}] ${h.detail} - ${h.person}`).join('<br>')||'이력 없음';if(ql.includes('미수금')||ql.includes('수금'))return `미수금: <b>${calcRem(site).toLocaleString()}원</b>`;if(ql.includes('단계')||ql.includes('공정'))return `현재: <b>${STAGES[site.stage]}</b>`;if(ql.includes('회의록'))return site.minutes.map(m=>`📋 ${m.date} ${m.title}[${m.read?'확인':'미확인'}]`).join('<br>')||'없음';if(ql.includes('수량')||ql.includes('발주'))return Object.entries(site.qty).map(([p,v])=>`${p}: 발주<b>${v.order}</b>/납품<b>${v.deliver}</b>/설치<b>${v.install}</b>`).join('<br>')||'수량 없음';return `${site.name}: ${STAGES[site.stage]}·이슈 ${site.issues.filter(i=>!i.done).length}건·미수금 ${calcRem(site).toLocaleString()}원`;}

// ── 업무일지 ──
function renderWJPage(){$('tabBar').innerHTML='';if(workJournals.length&&!selectedWJId)selectedWJId=workJournals[workJournals.length-1].id;const sel=workJournals.find(w=>w.id===selectedWJId);const list=`<div style="padding:7px;border-bottom:1px solid var(--border)"><button style="width:100%;padding:6px;background:rgba(61,127,255,0.1);border:1px dashed rgba(61,127,255,0.4);border-radius:6px;color:var(--accent);font-size:10px;cursor:pointer;font-family:Noto Sans KR,sans-serif" onclick="openModal('wjModal')">+ 업무일지 작성</button></div>${workJournals.slice().reverse().map(w=>`<div class="wj-list-item ${w.id===selectedWJId?'active':''}" onclick="selectedWJId=${w.id};renderWJPage()"><div style="font-size:12px;font-weight:500">${w.date}</div><div style="font-size:10px;color:var(--text2);margin-top:1px">${w.preview||''}</div></div>`).join('')||'<div style="padding:14px;text-align:center;color:var(--text2);font-size:11px">업무일지 없음</div>'}`;
const viewer=sel?renderWJDoc(sel):`<div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--text2)">업무일지 선택 또는 작성</div>`;
$('mainContent').innerHTML=`<div style="height:calc(100vh - 100px);display:grid;grid-template-columns:190px 1fr;overflow:hidden;border:1px solid var(--border);border-radius:10px;background:var(--bg2)"><div style="overflow-y:auto;border-right:1px solid var(--border)">${list}</div><div style="overflow-y:auto;padding:18px">${viewer}</div></div>`;}
function renderWJDoc(w){const lines=w.content.split('\n');let html=`<div class="wj-doc"><div class="wj-date-hdr">📅 ${w.date} 업무일지</div>`;let cs='',ci='',cc=[];const fI=()=>{if(ci){html+=`<div class="wj-item"><div class="wj-item-title">${ci}</div>${cc.length?`<div class="wj-item-content">${cc.join('\n')}</div>`:''}</div>`;cc=[];}};const fS=()=>{if(cs){html+='</div>';cs='';}};lines.forEach(line=>{const t=line.trim();if(!t)return;if(/^\d+\]/.test(t)){fI();if(cs)fS();html+=`<div class="wj-section"><div class="wj-section-title">${t}</div>`;cs=t;ci='';}else if(t.startsWith('-')){fI();ci=t.slice(1).trim();}else if(t.startsWith('.')||t.startsWith(';')){cc.push('  '+t);}else if(t.includes('-')&&!t.startsWith('-')&&t.split('-').length===2){fI();html+=`<div class="wj-route">🚗 ${t}</div>`;}else if(t.startsWith('예정사항')){fI();html+=`<div class="wj-next">⏭ ${t}</div>`;}else{cc.push(t);}});fI();fS();html+=`<div class="min-doc-actions"><button class="doc-btn db-del" onclick="delWJ(${w.id})">삭제</button></div></div>`;return html;}
function addWJ(){const c=$('wj-content').value.trim();if(!c)return;const d=$('wj-date').value||today();const p=c.split('\n').find(l=>l.trim()&&l.trim().length>2)||c.slice(0,30);const w={id:Date.now(),date:d,content:c,preview:p.trim().slice(0,38)};workJournals.push(w);selectedWJId=w.id;closeModal('wjModal');renderSiteList();renderWJPage();}
function delWJ(id){if(!confirm('삭제?'))return;workJournals=workJournals.filter(w=>w.id!==id);selectedWJId=workJournals.length?workJournals[workJournals.length-1].id:null;renderSiteList();renderWJPage();}

// ── 대시보드 ──
function renderDash(){$('tabBar').innerHTML='';const tI=sites.reduce((a,s)=>a+s.issues.filter(i=>!i.done).length,0),tU=sites.reduce((a,s)=>a+s.minutes.filter(m=>!m.read).length,0),tA=sites.reduce((a,s)=>a+s.actions.filter(x=>!x.done).length,0),tR=sites.reduce((a,s)=>a+calcRem(s),0),tH=sites.reduce((a,s)=>a+(s.excelHistory||[]).length,0);$('mainContent').innerHTML=`<div style="margin-bottom:12px"><h2 style="font-size:16px;font-weight:700">전체 현황</h2><p style="font-size:11px;color:var(--text2);margin-top:2px">현장 ${sites.length}개 · 업무일지 ${workJournals.length}건 · 수량변경이력 ${tH}건</p></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-label">진행 현장</div><div class="kpi-val" style="color:var(--accent)">${sites.length}</div></div><div class="kpi-card"><div class="kpi-label">미결 이슈</div><div class="kpi-val" style="color:var(--danger)">${tI}</div></div><div class="kpi-card"><div class="kpi-label">미확인 회의록</div><div class="kpi-val" style="color:var(--warn)">${tU}</div></div><div class="kpi-card"><div class="kpi-label">미수금 합계</div><div class="kpi-val" style="color:var(--purple);font-size:16px">${(tR/10000).toFixed(0)}만원</div></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-label">영업 파이프라인</div><div class="kpi-val" style="color:var(--green)">${pipeline.length}</div></div><div class="kpi-card"><div class="kpi-label">수량변경이력</div><div class="kpi-val" style="color:var(--orange)">${tH}</div><div class="kpi-sub">전체 현장</div></div><div class="kpi-card"><div class="kpi-label">완료 현장</div><div class="kpi-val" style="color:var(--text3)">${sites.filter(s=>s.stage===6).length}</div></div><div class="kpi-card"><div class="kpi-label">설치 진행</div><div class="kpi-val" style="color:var(--accent)">${sites.filter(s=>s.stage>=4&&s.stage<6).length}</div></div></div><div class="card"><div class="card-hdr"><span class="card-title">현장별 현황</span></div>${sites.map(s=>`<div class="row-item" style="cursor:pointer" onclick="selectSite(${s.id})"><div class="dot" style="background:${s.issues.filter(i=>!i.done).length>0?'var(--danger)':'var(--green)'}"></div><div style="flex:1"><div class="row-title">${s.name}</div><div class="row-meta">${s.addr}·${STAGES[s.stage]}·수량이력 ${(s.excelHistory||[]).length}건</div></div>${s.issues.filter(i=>!i.done).length>0?`<span class="mbadge mb-r">이슈 ${s.issues.filter(i=>!i.done).length}</span>`:`<span class="mbadge mb-g">정상</span>`}</div>`).join('')}</div>`;}

// ── 영업 파이프라인 ──
function renderPipeline(){$('tabBar').innerHTML='';const cols=PIPE_STAGES.map((stage,i)=>{const cards=pipeline.filter(p=>p.stage===i).map(p=>`<div class="pipe-card"><div class="pipe-card-name">${p.name}</div><div class="pipe-card-meta">${p.client}</div>${p.amount>0?`<div style="font-size:10px;color:var(--accent);margin-top:3px;font-family:JetBrains Mono">${(p.amount/10000).toFixed(0)}만원</div>`:''}<div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">${i>0?`<span style="font-size:10px;color:var(--text2);cursor:pointer" onclick="mvPipe(${p.id},-1)">←이전</span>`:''} ${i<4?`<span style="font-size:10px;color:var(--accent);cursor:pointer" onclick="mvPipe(${p.id},1)">다음→</span>`:''} ${i===4?`<span style="font-size:10px;color:var(--green);cursor:pointer" onclick="convPipe(${p.id})">현장전환</span>`:''}<span style="font-size:10px;color:var(--danger);cursor:pointer;margin-left:auto" onclick="delPipe(${p.id})">삭제</span></div></div>`).join('');return `<div class="pipe-col"><div class="pipe-col-title">${stage} <span style="color:var(--text3)">${pipeline.filter(p=>p.stage===i).length}</span></div>${cards}<button class="pipe-add" onclick="openPM(${i})">+ 추가</button></div>`;}).join('');$('mainContent').innerHTML=`<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between"><div><h2 style="font-size:16px;font-weight:700">영업 파이프라인</h2><p style="font-size:11px;color:var(--text2);margin-top:2px">계약 전 현장 관리</p></div><button onclick="openModal('pipeModal')" style="padding:7px 12px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer;font-family:Noto Sans KR,sans-serif">+ 현장 추가</button></div><div style="overflow-x:auto"><div class="pipe-cols">${cols}</div></div>`;}
function openPM(s){$('pipe-stage').value=s;openModal('pipeModal');}
function addPipe(){const n=$('pipe-name').value.trim();if(!n)return;pipeline.push({id:Date.now(),name:n,client:$('pipe-client').value,addr:$('pipe-addr').value,stage:parseInt($('pipe-stage').value)||0,amount:parseInt($('pipe-amount').value)||0,note:$('pipe-note').value});closeModal('pipeModal');renderPipeline();}
function mvPipe(id,dir){pipeline.find(x=>x.id===id).stage=Math.max(0,Math.min(4,pipeline.find(x=>x.id===id).stage+dir));renderPipeline();}
function delPipe(id){if(!confirm('삭제?'))return;pipeline=pipeline.filter(p=>p.id!==id);renderPipeline();}
function convPipe(id){const p=pipeline.find(x=>x.id===id);if(!confirm(`"${p.name}"을 PM 현장으로 전환할까요?`))return;sites.push({id:Date.now(),name:p.name,addr:p.addr,products:'',client:p.client,stage:0,qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}});pipeline=pipeline.filter(x=>x.id!==id);showToast(p.name+' 전환 완료');renderSiteList();renderPipeline();}

// ── 캘린더 ──
function renderCalendar(){$('tabBar').innerHTML='';const today_d=new Date();const fD=new Date(calYear,calMonth,1).getDay();const dim=new Date(calYear,calMonth+1,0).getDate();const allEv=sites.flatMap(s=>(s.schedule||[]).map(e=>({...e,site:s.name})));const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];let cells='';let day=1-fD;for(let r=0;r<6;r++){if(day>dim)break;for(let c=0;c<7;c++,day++){if(day<1||day>dim){cells+=`<div class="cal-cell other-month"></div>`;continue;}const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const isTd=day===today_d.getDate()&&calMonth===today_d.getMonth()&&calYear===today_d.getFullYear();const evs=allEv.filter(e=>e.date===ds).map(e=>`<div class="cal-event">${e.site.slice(0,3)} ${e.title}</div>`).join('');const wjEvs=workJournals.filter(w=>w.date===ds).map(()=>`<div class="cal-event" style="background:rgba(167,139,250,0.2);color:var(--purple)">📝업무일지</div>`).join('');cells+=`<div class="cal-cell ${isTd?'today':''}"><div class="cal-date" style="${isTd?'color:var(--accent);font-weight:700':''}">${day}</div>${evs}${wjEvs}</div>`;}}$('mainContent').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:16px;font-weight:700">공정 캘린더</h2><div style="display:flex;align-items:center;gap:10px"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()" style="padding:4px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer">‹</button><span style="font-size:14px;font-weight:500">${calYear}년 ${mn[calMonth]}</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()" style="padding:4px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer">›</button></div></div><div class="card" style="padding:10px"><div class="cal-grid">${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-hdr-cell">${d}</div>`).join('')}${cells}</div></div>`;}

// ── 현장 추가 ──
function addSite(){const n=$('ns-name').value.trim();if(!n)return;const s={id:Date.now(),name:n,addr:$('ns-addr').value,products:$('ns-products').value,client:$('ns-client').value,stage:parseInt($('ns-stage').value)||0,qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}};sites.push(s);closeModal('addSiteModal');renderSiteList();selectSite(s.id);}

// ── 모달 ──
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');}));

init();
</script>
</body>
</html>
