<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM 현장관리 v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--border:#252a38;--accent:#3d7fff;--green:#00c896;--warn:#f5a623;--danger:#ff4d4d;--text:#ffffff;--text2:#a0aec0;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        .hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;}
        .logo{display:flex;align-items:center;gap:8px;}
        .logo-mark{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;}
        .logo-name{font-size:13px;font-weight:700;}.logo-sub{font-size:10px;color:var(--text2);}
        .hdr-btns{display:flex;align-items:center;gap:8px;}
        .hdr-date{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-right:4px;}
        .hbtn{padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;font-weight:500;}
        .hbtn.load{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
        .hbtn.save{background:var(--accent);color:#fff;}
        .layout{display:flex;flex:1;overflow:hidden;}
        .sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
        .side-btn-container{padding:10px;}
        .btn-add-site{width:100%;padding:8px;background:transparent;border:1px dashed var(--accent);color:var(--accent);border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;}
        .side-menu{flex:1;overflow-y:auto;padding:0 10px;}
        .menu-section{margin-bottom:15px;}
        .menu-item{padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text2);font-size:12px;margin-bottom:2px;}
        .menu-item.active{background:var(--bg3);color:#fff;font-weight:500;}
        .menu-item-dot{width:6px;height:6px;border-radius:5px;background:var(--text2);}
        .menu-item.active .menu-item-dot{background:var(--accent);}
        .menu-title{font-size:10px;color:var(--text2);padding:5px 10px;text-transform:uppercase;font-weight:700;letter-spacing:0.5px;}
        .badge-alert{margin-left:auto;font-size:10px;background:var(--danger);padding:2px 6px;border-radius:10px;color:#fff;}
        .main-content{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
        .content-hdr{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:start;flex-shrink:0;}
        .site-info-title{font-size:16px;font-weight:700;margin-bottom:4px;}
        .site-info-desc{font-size:11px;color:var(--text2);}
        .tabs-container{padding:0 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;background:var(--bg2);overflow-x:auto;flex-shrink:0; white-space:nowrap;}
        .tabs-container::-webkit-scrollbar{display:none;}
        .tab-item{padding:10px 12px;cursor:pointer;color:var(--text2);font-size:12px;border-bottom:2px solid transparent;display:inline-block;}
        .tab-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
        .view-container{flex:1;padding:14px;overflow-y:auto;}
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px;}
        .card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
        .btn-action{background:rgba(0,198,150,0.1);border:1px solid rgba(0,198,150,0.2);color:var(--green);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500;}
        .btn-action.outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
        
        /* 엑셀 렌더링 영역 스타일 */
        #excel-render-area{width:100%;overflow:auto;max-height:600px;background:#fff;border-radius:4px;color:#000;}
        #excel-render-area table{border-collapse:collapse;white-space:nowrap;font-size:11px;}
        #excel-render-area td, #excel-render-area th{border:1px solid #ccc;padding:8px 10px;text-align:center;cursor:pointer;}
        #excel-render-area td:hover{background-color:#f0f8ff;}
        .cell-changed{background-color:#ffe4e1 !important; font-weight:bold; color:red;}

        /* 모달 팝업 스타일 */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:999;}
        .modal{background:var(--bg2);width:90%;max-width:400px;border-radius:12px;border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:15px;}
        .modal-title{font-size:14px;font-weight:700;color:var(--warn);border-bottom:1px solid var(--border);padding-bottom:10px;}
        .modal-row{display:flex;flex-direction:column;gap:5px;}
        .modal-row label{font-size:11px;color:var(--text2);}
        .modal-row input{background:var(--bg3);border:1px solid var(--border);color:#fff;padding:8px;border-radius:6px;font-size:12px;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;}
        .modal-btns button{padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-weight:500;}
        .btn-cancel{background:var(--bg3);color:var(--text);}
        .btn-confirm{background:var(--warn);color:#000;}
        .btn-confirm:disabled{opacity:0.5;cursor:not-allowed;}

        /* 이력 조회 모달 전용 */
        .history-modal{max-width:700px;width:95%;max-height:80vh;}
        .history-table-wrapper{overflow-y:auto;max-height:400px;border:1px solid var(--border);border-radius:6px;margin-top:10px;}
        .history-table{width:100%;border-collapse:collapse;font-size:11px;}
        .history-table th{background:var(--bg3);position:sticky;top:0;padding:8px;text-align:left;color:var(--text2);}
        .history-table td{padding:8px;border-bottom:1px solid var(--border);color:#fff;}
    </style>
</head>
<body>

    <div class="hdr">
        <div class="logo">
            <div class="logo-mark">KM</div>
            <div>
                <div class="logo-name">한국마이크로닉</div>
                <div class="logo-sub">현장관리 v3</div>
            </div>
        </div>
        <div class="hdr-btns">
            <div class="hdr-date" id="current-date"></div>
            <button class="hbtn load">불러오기</button>
            <button class="hbtn save">저장</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="side-menu">
                <div class="menu-section">
                    <div class="menu-title">진행 현장</div>
                    <div class="menu-item active">
                        <div class="menu-item-dot"></div>
                        <span>연수동 FIP 현장</span>
                        <span class="badge-alert">이슈 1</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="content-hdr">
                <div>
                    <div class="site-info-title">연수동 FIP 현장</div>
                    <div class="site-info-desc">인천 연수구 · 수량표 및 협의 이력 관리</div>
                </div>
            </div>

            <div class="tabs-container">
                <div class="tab-item active">수량표</div>
                <div class="tab-item">회의록</div>
                <div class="tab-item">미결이슈</div>
                <div class="tab-item">후속조치</div>
                <div class="tab-item">발주처대화</div>
                <div class="tab-item">메일</div>
                <div class="tab-item">카카오톡</div>
            </div>

            <div class="view-container">
                <div class="card">
                    <div class="card-title">
                        <span>원본 수량표 연동 데이터</span>
                        <div style="display:flex; gap:8px;">
                            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
                            <button class="btn-action" onclick="document.getElementById('excel-upload').click()">📊 엑셀 업로드</button>
                            <button class="btn-action outline" onclick="openHistoryModal()">📝 이력 조회</button>
                        </div>
                    </div>
                    <div id="excel-render-area">
                        <div style="padding:40px; text-align:center; color:var(--text2); font-size:12px;">
                            엑셀 파일을 업로드하면 원본 표가 이곳에 렌더링됩니다.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-title">⚠️ 수량 변경 사항 저장</div>
            <div style="font-size:11px; color:var(--text2); margin-bottom:5px;">선택한 칸의 기존 값: <strong id="old-value-display" style="color:#fff;"></strong></div>
            
            <div class="modal-row">
                <label>변경할 새 수치 입력</label>
                <input type="text" id="input-new-val" placeholder="숫자 입력" onkeyup="checkEditForm()">
            </div>
            <div class="modal-row">
                <label>변경 일자</label>
                <input type="date" id="input-date" onchange="checkEditForm()">
            </div>
            <div class="modal-row">
                <label>지시자 (확인자)</label>
                <input type="text" id="input-person" placeholder="예: 박업체 대리" onkeyup="checkEditForm()">
            </div>
            <div class="modal-row">
                <label>변경 사유 (명확히 기재)</label>
                <input type="text" id="input-reason" placeholder="예: 2층 설계 변경으로 인한 추가" onkeyup="checkEditForm()">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeEditModal()">취소</button>
                <button class="btn-confirm" id="btn-save-edit" disabled onclick="saveEdit()">변경사항 최종 저장</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="history-modal">
        <div class="modal history-modal">
            <div class="modal-title" style="display:flex; justify-content:space-between; align-items:center;">
                <span>📋 수량 변경 이력 증빙표</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action outline" onclick="copyHistoryText()">텍스트 복사</button>
                    <button class="btn-action" onclick="downloadHistoryExcel()">엑셀 다운로드</button>
                </div>
            </div>
            <div class="history-table-wrapper">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>일자</th>
                            <th>변경 내역 (이전 ➔ 새값)</th>
                            <th>지시자</th>
                            <th>사유</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        </tbody>
                </table>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="document.getElementById('history-modal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 날짜 초기화
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('current-date').innerText = todayStr.replace(/-/g, '. ') + '.';
        document.getElementById('input-date').value = todayStr;

        // 전역 데이터 관리
        let changeHistory = [];
        let currentEditingCell = null;

        // 엑셀 업로드 및 렌더링 처리
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // 보수적 접근: 첫 번째 시트만 무조건 읽음
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // HTML 형태로 렌더링 추출 (셀 병합 유지)
                const htmlStr = XLSX.utils.sheet_to_html(worksheet);
                document.getElementById('excel-render-area').innerHTML = htmlStr;

                // 렌더링된 셀에 클릭 이벤트 부여 (수정 기능)
                attachCellClickEvents();
            };
            reader.readAsArrayBuffer(file);
        }

        // 각 셀 클릭 시 팝업 열기
        function attachCellClickEvents() {
            const cells = document.querySelectorAll('#excel-render-area td');
            cells.forEach(cell => {
                cell.addEventListener('click', function() {
                    currentEditingCell = this;
                    document.getElementById('old-value-display').innerText = this.innerText || "(빈칸)";
                    document.getElementById('input-new-val').value = '';
                    document.getElementById('input-person').value = '';
                    document.getElementById('input-reason').value = '';
                    document.getElementById('edit-modal').style.display = 'flex';
                    checkEditForm();
                });
            });
        }

        // 폼 유효성 검사 (빈칸 1개라도 있으면 저장 차단)
        function checkEditForm() {
            const val = document.getElementById('input-new-val').value.trim();
            const date = document.getElementById('input-date').value;
            const person = document.getElementById('input-person').value.trim();
            const reason = document.getElementById('input-reason').value.trim();
            
            const btn = document.getElementById('btn-save-edit');
            if(val && date && person && reason) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditingCell = null;
        }

        // 변경사항 저장 및 이력 누적
        function saveEdit() {
            if(!currentEditingCell) return;

            const oldVal = currentEditingCell.innerText;
            const newVal = document.getElementById('input-new-val').value;
            const date = document.getElementById('input-date').value;
            const person = document.getElementById('input-person').value;
            const reason = document.getElementById('input-reason').value;

            // 차분 이력 저장
            changeHistory.push({
                date: date,
                change: `${oldVal || '-'} ➔ ${newVal}`,
                person: person,
                reason: reason
            });

            // 화면상 셀 수정 및 시각적 표식 적용
            currentEditingCell.innerText = newVal;
            currentEditingCell.classList.add('cell-changed');

            closeEditModal();
        }

        // 이력 조회 팝업 열기 및 리스트 렌더링
        function openHistoryModal() {
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = '';
            
            if(changeHistory.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">변경 이력이 없습니다.</td></tr>';
            } else {
                // 최신순 정렬
                const sortedHistory = [...changeHistory].reverse();
                sortedHistory.forEach(h => {
                    tbody.innerHTML += `<tr>
                        <td>${h.date}</td>
                        <td>${h.change}</td>
                        <td>${h.person}</td>
                        <td>${h.reason}</td>
                    </tr>`;
                });
            }
            document.getElementById('history-modal').style.display = 'flex';
        }

        // 텍스트 일괄 복사 (카톡 전송용)
        function copyHistoryText() {
            if(changeHistory.length === 0) return alert("복사할 이력이 없습니다.");
            let txt = "[연수동 FIP 현장 수량 변경 내역]\n\n";
            changeHistory.forEach(h => {
                txt += `▪ ${h.date} | ${h.person} 지시\n - 변경: ${h.change}\n - 사유: ${h.reason}\n\n`;
            });
            navigator.clipboard.writeText(txt).then(() => {
                alert("이력이 복사되었습니다. 카카오톡에 바로 붙여넣기 하세요.");
            });
        }

        // 엑셀 다운로드 증빙 (SheetJS 활용)
        function downloadHistoryExcel() {
            if(changeHistory.length === 0) return alert("다운로드할 이력이 없습니다.");
            
            const ws = XLSX.utils.json_to_sheet(changeHistory);
            // 한글 헤더 매핑
            XLSX.utils.sheet_add_aoa(ws, [["변경일자", "변경내역(이전->이후)", "지시자", "사유"]], { origin: "A1" });
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "변경이력");
            
            // 파일명 규칙 적용
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            XLSX.writeFile(wb, `연수동_수량변경이력_${today}.xlsx`);
        }
    </script>
</body>
</html>
