<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>한국마이크로닉 현장관리 v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bd:#252a38;--ac:#3d7fff;--gr:#00c896;--wa:#f5a623;--da:#ff4d4d;--tx:#e8ecf4;--tx2:#8892a8;--tx3:#4a5568;--pu:#a78bfa;--or:#ff8c42;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 12px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;}
.lm{width:24px;height:24px;background:var(--ac);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.ln{font-size:12px;font-weight:700;}.ls{font-size:9px;color:var(--tx2);}
.hbtns{display:flex;gap:5px;align-items:center;}
.hdate{font-size:10px;color:var(--tx2);font-family:'JetBrains Mono',monospace;}
.hbtn{padding:4px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:195px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.sbtop{padding:8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:5px;}
.addbtn{width:100%;padding:6px;background:rgba(61,127,255,0.12);border:1px dashed rgba(61,127,255,0.4);border-radius:7px;color:var(--ac);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.ssearch{width:100%;padding:6px 9px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.ssearch::placeholder{color:var(--tx3);}
.ssec{padding:5px 9px 2px;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.06em;}
.slwrap{flex:1;overflow-y:auto;padding:5px;}
.slwrap::-webkit-scrollbar{width:2px;}
.slwrap::-webkit-scrollbar-thumb{background:var(--bd);}
.si{padding:8px 9px;border-radius:7px;cursor:pointer;margin-bottom:2px;transition:background 0.15s;border-left:2px solid transparent;}
.si:hover{background:var(--bg3);}
.si.active{background:rgba(61,127,255,0.12);border-left-color:var(--ac);}
.sin{font-size:12px;font-weight:500;}
.sim{font-size:10px;color:var(--tx2);margin-top:1px;}
.sibs{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.mb{font-size:9px;padding:1px 4px;border-radius:6px;}
.mb-r{background:rgba(255,77,77,0.15);color:var(--da);}
.mb-w{background:rgba(245,166,35,0.15);color:var(--wa);}
.mb-g{background:rgba(0,200,150,0.12);color:var(--gr);}
.mb-b{background:rgba(61,127,255,0.12);color:var(--ac);}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tabbar{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;padding:0 12px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabbar::-webkit-scrollbar{display:none;}
.tab{padding:9px 10px;font-size:11px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:500;}
.content{flex:1;overflow-y:auto;padding:12px;}
.content::-webkit-scrollbar{width:3px;}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.chdr{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.ctit{font-size:12px;font-weight:500;}
.cbtn{font-size:10px;color:var(--ac);cursor:pointer;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.shdr h2{font-size:16px;font-weight:700;}
.shdr p{font-size:11px;color:var(--tx2);margin-top:2px;}
.spill{font-size:11px;padding:3px 9px;border-radius:18px;background:rgba(61,127,255,0.15);color:var(--ac);white-space:nowrap;}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px;}
.kcard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;}
.klbl{font-size:10px;color:var(--tx2);margin-bottom:5px;}
.kval{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.ksub{font-size:10px;color:var(--tx3);margin-top:3px;}
.alert-banner{padding:10px 13px;display:flex;align-items:center;gap:8px;font-size:12px;}
.alert-banner.danger{background:rgba(255,77,77,0.1);border-left:3px solid var(--da);color:var(--da);}
.alert-banner.warn{background:rgba(245,166,35,0.1);border-left:3px solid var(--wa);color:var(--wa);}
.alert-banner.info{background:rgba(61,127,255,0.1);border-left:3px solid var(--ac);color:var(--ac);}
.ri{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:flex-start;}
.ri:last-child{border-bottom:none;}
.dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.rtit{font-size:12px;font-weight:500;}
.rmeta{font-size:10px;color:var(--tx2);margin-top:2px;}
.dday{font-size:9px;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;}
.dd-ok{background:rgba(0,200,150,0.1);color:var(--gr);}
.dd-wa{background:rgba(245,166,35,0.15);color:var(--wa);}
.dd-da{background:rgba(255,77,77,0.15);color:var(--da);}
.ag{display:grid;grid-template-columns:1fr 70px 60px 50px;gap:7px;padding:10px 13px;border-bottom:1px solid var(--bd);align-items:center;}
.ag:last-child{border-bottom:none;}
.ag.hdr{background:var(--bg3);}
.cll{font-size:10px;color:var(--tx3);text-transform:uppercase;}
.chk{width:17px;height:17px;border:1px solid var(--bd);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;}
.chk.done{background:var(--gr);border-color:var(--gr);color:#fff;}
.mll{padding:10px 11px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background 0.15s;}
.mll:hover{background:var(--bg3);}
.mll.active{background:rgba(61,127,255,0.1);border-left:2px solid var(--ac);}
.mlt{font-size:11px;font-weight:500;line-height:1.4;}
.mlm{font-size:9px;color:var(--tx2);margin-top:2px;}
.mv{padding:18px;overflow-y:auto;}
.mdoc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:20px 24px;max-width:680px;}
.mdtit{font-size:16px;font-weight:700;margin-bottom:5px;}
.mdmeta{font-size:11px;color:var(--tx2);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd);}
.mdbody{font-size:13px;line-height:1.9;}
.mdbody h2{font-size:14px;font-weight:600;margin:14px 0 7px;}
.mdbody h3{font-size:13px;font-weight:600;margin:12px 0 6px;}
.mdbody table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
.mdbody th{background:var(--bg3);padding:7px 11px;text-align:left;border:1px solid var(--bd);font-weight:500;}
.mdbody td{padding:7px 11px;border:1px solid var(--bd);}
.mdbody ul,.mdbody ol{padding-left:18px;margin-bottom:9px;}
.mdbody li{margin-bottom:3px;}
.mdbody strong{font-weight:600;}
.mdact{display:flex;gap:7px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bd);flex-wrap:wrap;}
.dbtn{padding:6px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid;}
.dok{background:rgba(0,200,150,0.1);border-color:var(--gr);color:var(--gr);}
.ddel{background:rgba(255,77,77,0.1);border-color:var(--da);color:var(--da);}
.dai{background:rgba(167,139,250,0.1);border-color:var(--pu);color:var(--pu);}
.dwa{background:rgba(245,166,35,0.1);border-color:var(--wa);color:var(--wa);}
.qtag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(0,200,150,0.15);color:var(--gr);margin-top:4px;border:1px solid rgba(0,200,150,0.3);}
/* 출처 태그 - 회의록 링크용 */
.src-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(167,139,250,0.15);color:var(--pu);border:1px solid rgba(167,139,250,0.3);cursor:pointer;margin-left:5px;vertical-align:middle;}
.src-tag:hover{background:rgba(167,139,250,0.3);}
.memrow{padding:11px 13px;border-bottom:1px solid var(--bd);}
.memrow:last-child{border-bottom:none;}
.mtag{font-size:9px;padding:2px 5px;border-radius:6px;margin-right:5px;}
.mt-mail{background:rgba(167,139,250,0.15);color:var(--pu);}
.mt-kakao{background:rgba(245,166,35,0.15);color:var(--wa);}
.mt-sms{background:rgba(255,140,66,0.15);color:var(--or);}
.mt-etc{background:rgba(74,85,104,0.15);color:var(--tx3);}
.qtytbl{width:100%;border-collapse:collapse;}
.qtytbl th{padding:8px 11px;font-size:10px;color:var(--tx3);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bd);background:var(--bg3);}
.qtytbl td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.mono{font-family:'JetBrains Mono',monospace;}
.cg{color:var(--gr);}.cw{color:var(--wa);}.cr{color:var(--da);}
#excelArea{width:100%;overflow:auto;max-height:450px;background:var(--bg3);border-radius:6px;margin-top:8px;}
#excelArea table{border-collapse:collapse;white-space:nowrap;font-size:11px;color:var(--tx);width:max-content;}
#excelArea td,#excelArea th{border:1px solid var(--bd);padding:6px 9px;text-align:center;}
#excelArea td.editable:hover{background:rgba(61,127,255,0.1);cursor:pointer;}
.cell-changed{background:rgba(255,77,77,0.15)!important;color:var(--da)!important;font-weight:600!important;}
.wjli{padding:9px 11px;border-bottom:1px solid var(--bd);cursor:pointer;}
.wjli:hover{background:var(--bg3);}
.wjli.active{background:rgba(61,127,255,0.1);border-left:2px solid var(--ac);}
.wjdoc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px;max-width:680px;}
.wjhdr{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--ac);}
.wjsec{margin-bottom:14px;}
.wjsect{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--bd);}
.wjit{font-size:13px;font-weight:500;margin-bottom:3px;}
.wjic{font-size:12px;color:var(--tx2);line-height:1.8;white-space:pre-wrap;padding-left:11px;}
.wjro{font-size:11px;color:var(--tx3);margin-top:7px;padding:5px 9px;background:var(--bg3);border-radius:5px;display:inline-block;}
.wjnx{font-size:11px;color:var(--wa);margin-top:5px;}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;padding:12px;}
.fcard{background:var(--bg3);border:1px solid var(--bd);border-radius:9px;padding:11px;cursor:pointer;}
.fcard:hover{border-color:var(--ac);}
.fico{font-size:26px;margin-bottom:7px;}
.fname{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fmeta{font-size:9px;color:var(--tx2);margin-top:3px;}
.fadda{border:2px dashed var(--bd);border-radius:9px;padding:26px;text-align:center;cursor:pointer;margin:12px;}
.fadda:hover{border-color:var(--ac);}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px;padding:12px;}
.pit{aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--bg3);position:relative;}
.pit img{width:100%;height:100%;object-fit:cover;}
.pdel{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.65);border:none;border-radius:3px;color:#fff;font-size:10px;padding:2px 4px;cursor:pointer;display:none;}
.pit:hover .pdel{display:block;}
.padd{aspect-ratio:1;border-radius:7px;border:1px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--tx3);font-size:10px;}
.padd:hover{border-color:var(--ac);color:var(--ac);}
.calct{width:100%;border-collapse:collapse;}
.calct th{padding:8px 11px;font-size:10px;color:var(--tx3);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--bd);text-align:left;}
.calct td{padding:9px 11px;border-bottom:1px solid var(--bd);font-size:12px;}
.calct tfoot td{font-weight:700;background:var(--bg3);}
.pcols{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;min-width:680px;}
.pcol{background:var(--bg3);border-radius:9px;padding:9px;}
.pcolt{font-size:11px;font-weight:500;margin-bottom:8px;color:var(--tx2);}
.pcard{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:9px;margin-bottom:7px;}
.pcn{font-size:12px;font-weight:500;}
.pcm{font-size:10px;color:var(--tx2);margin-top:2px;}
.padd2{width:100%;padding:6px;background:transparent;border:1px dashed var(--bd);border-radius:7px;color:var(--tx3);font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.aichat{padding:12px;}
.aimsgs{min-height:80px;margin-bottom:10px;}
.aiq{background:var(--bg3);border-radius:9px 9px 9px 2px;padding:7px 11px;font-size:12px;display:inline-block;max-width:80%;margin-bottom:7px;}
.aia{background:rgba(61,127,255,0.08);border:1px solid rgba(61,127,255,0.2);border-radius:9px 9px 2px 9px;padding:7px 11px;font-size:12px;display:inline-block;max-width:85%;float:right;clear:both;line-height:1.7;}
.cf::after{content:'';display:table;clear:both;}
.airow{display:flex;gap:7px;}
.aiinp{flex:1;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;font-size:12px;color:var(--tx);font-family:'Noto Sans KR',sans-serif;outline:none;}
.aiinp:focus{border-color:var(--ac);}
.aiinp::placeholder{color:var(--tx3);}
.aisend{background:var(--ac);border:none;border-radius:7px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.calh{text-align:center;font-size:10px;color:var(--tx2);padding:7px 0;}
.calc{min-height:55px;background:var(--bg3);border-radius:5px;padding:3px;}
.calc.today{border:1px solid var(--ac);}
.calc.om{opacity:0.35;}
.cald{font-size:10px;color:var(--tx2);margin-bottom:2px;}
.calev{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;line-height:1.4;background:rgba(61,127,255,0.2);color:var(--ac);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wodoc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:22px;max-width:660px;}
.wotit{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px;}
.wosub{font-size:11px;color:var(--tx2);text-align:center;margin-bottom:18px;}
.wotbl{width:100%;border-collapse:collapse;margin-bottom:12px;}
.wotbl th{background:var(--bg3);padding:8px 11px;text-align:left;border:1px solid var(--bd);font-size:11px;width:100px;}
.wotbl td{padding:8px 11px;border:1px solid var(--bd);font-size:12px;}
.wosign{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:14px;}
.wosignb{border:1px solid var(--bd);border-radius:7px;padding:10px;text-align:center;}
.wosignl{font-size:10px;color:var(--tx2);margin-bottom:18px;}
.histt{width:100%;border-collapse:collapse;font-size:11px;}
.histt th{background:var(--bg3);position:sticky;top:0;padding:9px;text-align:left;color:var(--tx2);font-weight:500;border-bottom:1px solid var(--bd);}
.histt td{padding:9px;border-bottom:1px solid var(--bd);color:var(--tx);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:18px;width:92%;max-width:500px;max-height:92vh;overflow-y:auto;}
.mtitle{font-size:14px;font-weight:600;margin-bottom:12px;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;color:var(--tx);font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:7px;}
.modal textarea{resize:vertical;min-height:80px;}
.mbtns{display:flex;gap:7px;margin-top:5px;}
.bok{flex:1;background:var(--ac);border:none;border-radius:7px;padding:9px;color:#fff;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.bwa{flex:1;background:var(--wa);border:none;border-radius:7px;padding:9px;color:#000;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.bca{flex:1;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.ai-extract-item{padding:8px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:8px;}
.ai-extract-item:last-child{border-bottom:none;}
.ai-extract-item input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;cursor:pointer;}
.ai-extract-text{font-size:12px;flex:1;}
.ai-extract-sub{font-size:10px;color:var(--tx2);margin-top:2px;}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:8px 16px;border-radius:7px;font-size:12px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.ai-loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--tx2);font-size:12px;}
.spin{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:600px){.kgrid{grid-template-columns:repeat(2,1fr);}.sidebar{width:155px;}.pcols{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="lm">KM</div>
    <div><div class="ln">한국마이크로닉</div><div class="ls">현장관리 v5 — AI 자동화</div></div>
  </div>
  <div class="hbtns">
    <span class="hdate" id="todayDate"></span>
    <button class="hbtn" style="background:rgba(61,127,255,0.15);border:1px solid rgba(61,127,255,0.4);color:var(--ac)" onclick="loadCloud()">불러오기</button>
    <button class="hbtn" style="background:var(--ac);color:#fff" onclick="saveCloud()">저장</button>
    <button class="hbtn" id="editBtn" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx2)" onclick="toggleEdit()">✏️ 수정모드</button>
    <button class="hbtn" id="apiKeyBtn" style="background:var(--bg3);border:1px solid var(--bd);color:var(--tx2)" onclick="setApiKey()" title="Claude API 키 설정">🔑 API키</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sbtop">
      <button class="addbtn" onclick="om('addSite')">+ 현장 추가</button>
      <input class="ssearch" placeholder="현장 검색..." oninput="filterSites(this.value)"/>
    </div>
    <div class="slwrap" id="siteList"></div>
  </div>
  <div class="main-area">
    <div class="tabbar" id="tabBar"></div>
    <div class="content" id="mainContent"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzfF783inpczKxf1Y9-iWzHrGtjunk3RdqJVnCEjzkFczEh-cKymE9AZfdspm8Z-6ia/exec';
const CLAUDE_API='https://api.anthropic.com/v1/messages';
const STAGES=['설계중','CB외함 납품','분전함 설치','결선 작업','제품 설치','테스트','완료/수금'];
const PIPE_STAGES=['첫 접촉','설계의뢰','설계중','견적제출','계약완료'];
const PC={danger:'var(--da)',warn:'var(--wa)',low:'var(--tx3)'};
const DOC_TYPE={estimate:'📋 견적서',exec:'💹 실행예산',contract:'📝 계약서',change:'🔄 변경내역서',tax:'🧾 세금계산서'};
const MEM_TYPE={mail:'📧 메일',kakao:'💬 카카오톡',sms:'📱 문자',etc:'📝 기타'};
const TABS=['수량표','회의록','미결이슈','후속조치','발주처대화','메일','카카오톡','문자','작업의뢰서','사진','견적서','실행예산','계약서','첨부파일','AI대화'];

let sites=[
  {id:1,name:'연수동 FIP 현장',addr:'인천 연수구',products:'RCU, BSP, 챠임벨',client:'아카데미',stage:3,
   qty:{'챠임벨':{order:20,deliver:20,install:19,history:[]},'BSP':{order:19,deliver:19,install:0,history:[]}},
   issues:[{id:1,title:'잉여 속판 1개 소재 불명',priority:'danger',owner:'시공팀+아카데미',due:'2026-05-20',done:false}],
   actions:[{id:1,title:'잉여 속판 실물 확인',owner:'시공팀',due:'2026-05-16',done:false}],
   minutes:[],memos:[],photos:[],calc:[{id:1,name:'RCU 시스템 계약',type:'contract',amount:85000000,date:'2026-03-15',note:''}],
   workorders:[],docs:[],files:[],schedule:[{title:'챠임벨 설치',date:'2026-05-20'}],
   excelHistory:[],excelHtml:'',excelChanges:{}},
  {id:2,name:'단양 디캠프',addr:'충북 단양',products:'MMO, 키센서',client:'디캠프',stage:2,
   qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}}
];
let pipeline=[
  {id:1,name:'속초 신라호텔',client:'속초 신라',addr:'강원 속초',stage:1,amount:120000000,note:'설계의뢰 접수'},
  {id:2,name:'제주 JW메리어트',client:'JW메리어트',addr:'제주',stage:0,amount:0,note:'첫 미팅 완료'}
];
let workJournals=[];
let curSite=1,curTab='수량표',selMin=null,curView='site',selWJ=null;
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let editMode=false,qcTargetEl=null,qcTargetSid=null;
let qlSrcTab='',qlSrcIdx=-1;

// ★ 패치 1: AI 추출 전역변수 - aiExtMinId 추가
let aiExtType='',aiExtSid=null,aiExtItems={},aiExtMinId=null;
let i2wIssIdx=-1,i2wSid=null;

// ★ 패치 2: API 키 관리
let apiKey=localStorage.getItem('km_claude_key')||'';

// ── 유틸 ──
const td=()=>new Date().toISOString().slice(0,10);
function $(id){return document.getElementById(id);}
function om(id){$(id).classList.add('show');}
function cm(id){$(id).classList.remove('show');}
function toast(m){const t=$('toast');t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2600);}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');}));
function dday(due){if(!due)return'';const d=Math.ceil((new Date(due)-new Date(td()))/(1000*86400));if(d<0)return`<span class="dday dd-da">D+${Math.abs(d)}</span>`;if(d===0)return`<span class="dday dd-da">D-day</span>`;if(d<=3)return`<span class="dday dd-wa">D-${d}</span>`;return`<span class="dday dd-ok">D-${d}</span>`;}

// ★ 패치 3: API 키 설정 함수
function setApiKey(){
  const k=window.prompt('Claude API 키 입력 (sk-ant-...)\n현재: '+(apiKey?apiKey.slice(0,12)+'...':'미설정\n\nhttps://console.anthropic.com 에서 발급'));
  if(k===null)return;
  apiKey=k||'';
  if(k)localStorage.setItem('km_claude_key',k);else localStorage.removeItem('km_claude_key');
  const btn=$('apiKeyBtn');
  if(btn)btn.style.color=apiKey?'var(--gr)':'var(--tx2)';
  toast(apiKey?'✓ API 키 저장됨':'API 키 삭제됨');
}

// ── 클라우드 ──
async function saveCloud(){try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'save',data:{sites,pipeline,workJournals}})});toast('저장됐습니다 ✓');}catch(e){toast('저장 실패');}}
async function loadCloud(){toast('불러오는 중...');try{const r=await fetch(SCRIPT_URL+'?action=load');const j=await r.json();if(j.status==='ok'&&j.data){if(j.data.sites)sites=j.data.sites;if(j.data.pipeline)pipeline=j.data.pipeline;if(j.data.workJournals)workJournals=j.data.workJournals;toast('불러오기 완료 ✓');}else toast('저장 데이터 없음');}catch(e){toast('로컬 데이터 사용');}autoEscalate();renderSL();dispatch();}

// ── 자동화 ──
function autoEscalate(){sites.forEach(s=>{(s.issues||[]).forEach(iss=>{if(!iss.done&&iss.due&&new Date(iss.due)<new Date()&&iss.priority!=='danger'){iss.priority='danger';iss._autoEscalated=true;}});});}
function hasWJToday(){return workJournals.some(w=>w.date===td());}
function qtyAlerts(site){const alerts=[];Object.entries(site.qty||{}).forEach(([p,q])=>{const rem=(q.deliver||0)-(q.install||0);if(rem<0)alerts.push({type:'danger',msg:`[${p}] 설치 수량이 납품 수량 초과 (잔여 ${rem})`});if(q.order>0&&q.deliver<q.order)alerts.push({type:'warn',msg:`[${p}] 납품 수량 부족 (발주 ${q.order} / 납품 ${q.deliver})`});});return alerts;}
function calcRem(site){if(!site.calc)return 0;let t=0,c=0;site.calc.forEach(x=>{if(x.type==='contract'||x.type==='add')t+=x.amount;else if(x.type==='sub')t-=x.amount;else if(x.type==='collect')c+=x.amount;});return t-c;}
function toggleEdit(){editMode=!editMode;const b=$('editBtn');if(editMode){b.style.background='var(--wa)';b.style.color='#000';b.textContent='✏️ 수정중 (클릭=완료)';}else{b.style.background='var(--bg3)';b.style.border='1px solid var(--bd)';b.style.color='var(--tx2)';b.textContent='✏️ 수정모드';}toast(editMode?'수정모드 ON':'수정모드 OFF (보기전용)');}

// ── 초기화 ──
function init(){

// ── ★ 패치 4: Claude API 호출 (x-api-key 헤더 추가) ──
async function callClaude(prompt){
  if(!apiKey){
    const k=window.prompt('Claude API 키를 입력하세요 (sk-ant-...)\nhttps://console.anthropic.com 에서 발급\n한 번 입력하면 저장됩니다.');
    if(!k)throw new Error('API 키 없음 — 🔑 API키 버튼에서 설정하세요');
    apiKey=k;
    localStorage.setItem('km_claude_key',k);
    const btn=$('apiKeyBtn');if(btn)btn.style.color='var(--gr)';
  }
  const res=await fetch(CLAUDE_API,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  if(data.error){
    if(data.error.type==='authentication_error'){apiKey='';localStorage.removeItem('km_claude_key');const btn=$('apiKeyBtn');if(btn)btn.style.color='var(--tx2)';}
    throw new Error(data.error.message);
  }
  return data.content?.[0]?.text||'';
}

async function extractFromContent(content,type,sid){
  let prompt='';
  if(type==='issues'){
    prompt=`다음 회의록/업무일지에서 미결이슈와 문제점을 추출해주세요.\n반드시 JSON 배열로만 응답하세요. 다른 텍스트 없이.\n형식: [{"title":"이슈제목","priority":"danger|warn|low","owner":"담당자","due":"YYYY-MM-DD 또는 빈문자열"}]\n\n내용:\n${content}`;
  }else{
    prompt=`다음 회의록/업무일지에서 후속조치(액션아이템)를 추출해주세요.\n반드시 JSON 배열로만 응답하세요. 다른 텍스트 없이.\n형식: [{"title":"할일","owner":"담당자","due":"YYYY-MM-DD 또는 빈문자열"}]\n\n내용:\n${content}`;
  }
  try{
    const raw=await callClaude(prompt);
    const clean=raw.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){return[];}
}

function detectQtyChange(content){const patterns=[/(\d+)개에서\s*(\d+)개/,/수량.*?(\d+).*?(?:→|로)\s*(\d+)/,/(\d+)개.*?변경.*?(\d+)개/];return patterns.some(p=>p.test(content));}

// ★ 패치 6: applyAIExt - minuteId 연결 + 통합 형식 처리
function applyAIExt(){
  const site=sites.find(s=>s.id===aiExtSid);
  if(!site)return;
  let added=0;
  const iss=aiExtItems.issues||[];
  const acts=aiExtItems.actions||[];
  iss.forEach((item,i)=>{
    const cb=$(`aie_iss_${i}`);if(!cb||!cb.checked)return;
    site.issues.push({id:Date.now()+i,title:item.title,priority:item.priority||'warn',owner:item.owner||'미정',due:item.due||'',done:false,minuteId:aiExtMinId});
    added++;
  });
  acts.forEach((item,i)=>{
    const cb=$(`aie_act_${i}`);if(!cb||!cb.checked)return;
    site.actions.push({id:Date.now()+1000+i,title:item.title,owner:item.owner||'미정',due:item.due||'',done:false,minuteId:aiExtMinId});
    added++;
  });
  cm('aiExtModal');
  toast(`${added}개 항목 등록됐습니다 ✓`);
  autoEscalate();renderSL();renderTab(curTab);
}

// ★ 패치 7: runAIExtract - minId 파라미터 추가 + 통합 팝업 호출
async function runAIExtract(content,sid,minId=null){
  aiExtMinId=minId;
  toast('AI 분석 중...');
  try{
    const [issues,actions]=await Promise.all([
      extractFromContent(content,'issues',sid),
      extractFromContent(content,'actions',sid)
    ]);
    if(issues.length+actions.length===0){toast('AI가 추출한 항목이 없습니다');return;}
    showAIExtModalCombined(issues,actions,sid);
  }catch(e){
    toast('AI 분석 오류: '+e.message);
  }
}

// ── AI 대화 ──
function renderAI(site){return`<div class="card"><div class="chdr"><span class="ctit">🤖 AI 현장 대화 (Claude API)</span></div><div class="aichat"><div class="aimsgs" id="aiMsgs"><div><div class="aiq">${site.name} 오늘 현황 요약해줘</div></div><div class="cf"><div class="aia">${site.name} 현황:<br>📍 ${STAGES[site.stage]}<br>⚠️ 이슈 ${site.issues.filter(i=>!i.done).length}건<br>📋 미확인 회의록 ${site.minutes.filter(m=>!m.read).length}건<br>✅ 미완료 후속조치 ${site.actions.filter(a=>!a.done).length}건<br>💰 미수금 ${calcRem(site).toLocaleString()}원<br>📊 수량변경이력 ${(site.excelHistory||[]).length}건</div></div></div><div class="airow"><input class="aiinp" id="aiInp" placeholder="이슈, 수량, 작업의뢰서, 미수금..." onkeydown="if(event.key==='Enter')sendAI(${site.id})"/><button class="aisend" onclick="sendAI(${site.id})">전송</button></div></div></div>`;}
async function sendAI(sid){const inp=$('aiInp');const q=inp.value.trim();if(!q)return;inp.value='';const site=sites.find(s=>s.id===sid);const msgs=$('aiMsgs');msgs.innerHTML+=`<div style="margin-bottom:7px"><div class="aiq">${q}</div></div>`;msgs.innerHTML+=`<div class="cf" id="aiLoading"><div class="aia"><div class="ai-loading"><div class="spin"></div>AI 분석 중...</div></div></div>`;msgs.scrollTop=msgs.scrollHeight;const ctx=`현장명: ${site.name}\n공정단계: ${STAGES[site.stage]}\n미결이슈: ${site.issues.filter(i=>!i.done).map(i=>i.title).join(', ')||'없음'}\n미완료액션: ${site.actions.filter(a=>!a.done).map(a=>a.title).join(', ')||'없음'}\n미수금: ${calcRem(site).toLocaleString()}원\n수량: ${Object.entries(site.qty||{}).map(([p,v])=>`${p} 발주${v.order}/납품${v.deliver}/설치${v.install}`).join(', ')||'없음'}`;try{const ans=await callClaude(`당신은 한국마이크로닉 현장관리 AI 비서입니다. 호텔 객실관리 시스템(RCU/BSP/챠임벨/키센서 등) 전문가입니다.\n\n현장 정보:\n${ctx}\n\n질문: ${q}\n\n간결하고 실용적으로 답변해주세요.`);$('aiLoading')?.remove();msgs.innerHTML+=`<div class="cf" style="margin-bottom:7px"><div class="aia">${ans.replace(/\n/g,'<br>')}</div></div>`;}catch(e){$('aiLoading')?.remove();msgs.innerHTML+=`<div class="cf" style="margin-bottom:7px"><div class="aia">오류: ${e.message}</div></div>`;}msgs.scrollTop=msgs.scrollHeight;}

// ── 업무일지 ──
function openWJModal(){$('wj-d').value=td();const qs=$('wjQuickSites');qs.innerHTML=sites.map(s=>`<button style="padding:3px 8px;border:1px solid var(--bd);border-radius:5px;background:var(--bg3);color:var(--tx);font-size:10px;cursor:pointer;font-family:Noto Sans KR,sans-serif" onclick="insertSiteToWJ('${s.name}')">${s.name}</button>`).join('');const tmpl=genWJTemplate();$('wj-c').value=tmpl;om('wjModal');}
function genWJTemplate(){return`1]내근\n-업무 내용:\n\n2]외근 (시간)\n-담당자 협의\n .내용\n\n사무실-\n예정사항: `;}
function insertSiteToWJ(name){const ta=$('wj-c');const pos=ta.selectionStart;const v=ta.value;ta.value=v.slice(0,pos)+name+v.slice(pos);ta.selectionStart=ta.selectionEnd=pos+name.length;ta.focus();}
async function addWJ(){const c=$('wj-c').value.trim();if(!c)return;const date=$('wj-d').value||td();const preview=c.split('\n').find(l=>l.trim()&&l.trim().length>2)||c.slice(0,30);const w={id:Date.now(),date,content:c,preview:preview.trim().slice(0,38)};workJournals.push(w);selWJ=w.id;cm('wjModal');renderSL();renderWJPage();toast('업무일지 저장됨 — AI 분석 시작...');await runAIExtract(c,curSite);}
function renderWJPage(){$('tabBar').innerHTML='';if(workJournals.length&&!selWJ)selWJ=workJournals[workJournals.length-1].id;const sel=workJournals.find(w=>w.id===selWJ);const list=`<div style="padding:7px;border-bottom:1px solid var(--bd)"><button style="width:100%;padding:6px;background:${hasWJToday()?'rgba(61,127,255,0.1)':'rgba(255,77,77,0.1)'};border:1px dashed ${hasWJToday()?'rgba(61,127,255,0.4)':'rgba(255,77,77,0.4)'};border-radius:6px;color:${hasWJToday()?'var(--ac)':'var(--da)'};font-size:10px;cursor:pointer;font-family:Noto Sans KR,sans-serif" onclick="openWJModal()">${hasWJToday()?'+ 업무일지 작성':'🚨 오늘 업무일지 미작성 — 작성하기'}</button></div>${workJournals.slice().reverse().map(w=>`<div class="wjli ${w.id===selWJ?'active':''}" onclick="selWJ=${w.id};renderWJPage()"><div style="font-size:12px;font-weight:500">${w.date}${w.date===td()?' <span style=\'color:var(--gr);font-size:9px\'>오늘</span>':''}</div><div style="font-size:10px;color:var(--tx2);margin-top:1px">${w.preview||''}</div></div>`).join('')||'<div style="padding:14px;text-align:center;color:var(--tx2);font-size:11px">업무일지 없음</div>'}`;
const viewer=sel?renderWJDoc(sel):`<div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--tx2)">업무일지 선택 또는 작성</div>`;
$('mainContent').innerHTML=`<div style="height:calc(100vh - 100px);display:grid;grid-template-columns:185px 1fr;overflow:hidden;border:1px solid var(--bd);border-radius:10px;background:var(--bg2)"><div style="overflow-y:auto;border-right:1px solid var(--bd)">${list}</div><div style="overflow-y:auto;padding:18px">${viewer}</div></div>`;}
function renderWJDoc(w){const lines=w.content.split('\n');let html=`<div class="wjdoc"><div class="wjhdr">📅 ${w.date} 업무일지</div>`;let cs='',ci='',cc=[];const fI=()=>{if(ci){html+=`<div style="margin-bottom:9px"><div class="wjit">${ci}</div>${cc.length?`<div class="wjic">${cc.join('\n')}</div>`:''}</div>`;cc=[];}};const fS=()=>{if(cs){html+='</div>';cs='';}};lines.forEach(line=>{const t=line.trim();if(!t)return;if(/^\d+\]/.test(t)){fI();if(cs)fS();html+=`<div class="wjsec"><div class="wjsect">${t}</div>`;cs=t;ci='';}else if(t.startsWith('-')){fI();ci=t.slice(1).trim();}else if(t.startsWith('.')||t.startsWith(';')){cc.push('  '+t);}else if(t.includes('-')&&!t.startsWith('-')&&t.split('-').length===2){fI();html+=`<div class="wjro">🚗 ${t}</div>`;}else if(t.startsWith('예정사항')){fI();html+=`<div class="wjnx">⏭ ${t}</div>`;}else{cc.push(t);}});fI();fS();html+=`<div class="mdact"><button class="dbtn dai" onclick="runAIExtract(workJournals.find(w=>w.id==${w.id})?.content||'',${curSite})">🤖 이슈/액션 재추출</button><button class="dbtn ddel" onclick="delWJ(${w.id})">삭제</button></div></div>`;return html;}
function delWJ(id){if(!confirm('삭제?'))return;workJournals=workJournals.filter(w=>w.id!==id);selWJ=workJournals.length?workJournals[workJournals.length-1].id:null;renderSL();renderWJPage();}

function renderPipe(){$('tabBar').innerHTML='';const cols=PIPE_STAGES.map((stage,i)=>{const cards=pipeline.filter(p=>p.stage===i).map(p=>`<div class="pcard"><div class="pcn">${p.name}</div><div class="pcm">${p.client}</div>${p.amount>0?`<div style="font-size:10px;color:var(--ac);margin-top:3px;font-family:JetBrains Mono">${(p.amount/10000).toFixed(0)}만원</div>`:''}<div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">${i>0?`<span style="font-size:10px;color:var(--tx2);cursor:pointer" onclick="mvP(${p.id},-1)">←</span>`:''} ${i<4?`<span style="font-size:10px;color:var(--ac);cursor:pointer" onclick="mvP(${p.id},1)">→</span>`:''} ${i===4?`<span style="font-size:10px;color:var(--gr);cursor:pointer" onclick="convP(${p.id})">PM전환</span>`:''}<span style="font-size:10px;color:var(--da);cursor:pointer;margin-left:auto" onclick="delP2(${p.id})">삭제</span></div></div>`).join('');return`<div class="pcol"><div class="pcolt">${stage} <span style="color:var(--tx3)">${pipeline.filter(p=>p.stage===i).length}</span></div>${cards}<button class="padd2" onclick="openPM(${i})">+ 추가</button></div>`;}).join('');$('mainContent').innerHTML=`<div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between"><div><h2 style="font-size:16px;font-weight:700">영업 파이프라인</h2><p style="font-size:11px;color:var(--tx2);margin-top:2px">예상 계약금액 합계: ${(pipeline.reduce((a,p)=>a+p.amount,0)/10000).toFixed(0)}만원</p></div><button onclick="om('pipeModal')" style="padding:7px 12px;background:var(--ac);border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer;font-family:Noto Sans KR,sans-serif">+ 현장 추가</button></div><div style="overflow-x:auto"><div class="pcols">${cols}</div></div>`;}
function openPM(s){$('pi-s').value=s;om('pipeModal');}
function addPipe(){const n=$('pi-n').value.trim();if(!n)return;pipeline.push({id:Date.now(),name:n,client:$('pi-c').value,addr:$('pi-a').value,stage:parseInt($('pi-s').value)||0,amount:parseInt($('pi-am').value)||0,note:$('pi-no').value});cm('pipeModal');renderPipe();}
function mvP(id,dir){pipeline.find(x=>x.id===id).stage=Math.max(0,Math.min(4,pipeline.find(x=>x.id===id).stage+dir));renderPipe();}

function convP(id){const p=pipeline.find(x=>x.id===id);if(!confirm(`"${p.name}"을 PM 현장으로 전환할까요?`))return;sites.push({id:Date.now(),name:p.name,addr:p.addr,products:'',client:p.client,stage:0,qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}});pipeline=pipeline.filter(x=>x.id!==id);toast(p.name+' PM 전환 완료 ✓');renderSL();renderPipe();}

// ── 캘린더 ──
function renderCal(){$('tabBar').innerHTML='';const today_d=new Date();const fD=new Date(calY,calM,1).getDay();const dim=new Date(calY,calM+1,0).getDate();const allEv=sites.flatMap(s=>(s.schedule||[]).map(e=>({...e,site:s.name})));const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];let cells='';let day=1-fD;for(let r=0;r<6;r++){if(day>dim)break;for(let c=0;c<7;c++,day++){if(day<1||day>dim){cells+=`<div class="calc om"></div>`;continue;}const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const isTd=day===today_d.getDate()&&calM===today_d.getMonth()&&calY===today_d.getFullYear();const evs=allEv.filter(e=>e.date===ds).map(e=>`<div class="calev">${e.site.slice(0,3)} ${e.title}</div>`).join('');const wjEvs=workJournals.filter(w=>w.date===ds).map(()=>`<div class="calev" style="background:rgba(167,139,250,0.2);color:var(--pu)">📝일지</div>`).join('');cells+=`<div class="calc ${isTd?'today':''}"><div class="cald" style="${isTd?'color:var(--ac);font-weight:700':''}">${day}</div>${evs}${wjEvs}</div>`;}}$('mainContent').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:16px;font-weight:700">공정 캘린더</h2><div style="display:flex;align-items:center;gap:10px"><button onclick="calM--;if(calM<0){calM=11;calY--;}renderCal()" style="padding:4px 9px;background:var(--bg2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer">‹</button><span style="font-size:14px;font-weight:500">${calY}년 ${mn[calM]}</span><button onclick="calM++;if(calM>11){calM=0;calY++;}renderCal()" style="padding:4px 9px;background:var(--bg2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer">›</button></div></div><div class="card" style="padding:10px"><div class="calgrid">${['일','월','화','수','목','금','토'].map(d=>`<div class="calh">${d}</div>`).join('')}${cells}</div></div>`;}

// ── 현장 추가 ──
function addSite(){const n=$('ns-n').value.trim();if(!n)return;const s={id:Date.now(),name:n,addr:$('ns-a').value,products:$('ns-p').value,client:$('ns-c').value,stage:parseInt($('ns-s').value)||0,qty:{},issues:[],actions:[],minutes:[],memos:[],photos:[],calc:[],workorders:[],docs:[],files:[],schedule:[],excelHistory:[],excelHtml:'',excelChanges:{}};sites.push(s);cm('addSite');renderSL();selSite(s.id);}

init();
</script>
